  - '@id': metrics:ninjaone:users-technician-count
    '@type': liongard:MetricPrimitive
    dateAdded: '2026-05-26'
    description: Number of technician accounts in the NinjaOne tenant.
    evaluates:
      '@type': liongard:Inspector
      inspectorId: 72
      inspectorSlug: ninjaone-inspector
    jmesPath: length(Users)
    name: NinjaOne — Technician Count
    notes: Users[] is the NinjaOne technician/user roster. Users[].enabled is boolean.
    resultType: integer
    sourceRecipe: recipes/single-system-analysis/by-inspector/ninjaone.md
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System A (inspected 2026-05-18) — returned 2

  - '@id': metrics:ninjaone:users-mfa-enabled-count
    '@type': liongard:MetricPrimitive
    dateAdded: '2026-05-26'
    description: Number of technician accounts with MFA enabled.
    evaluates:
      '@type': liongard:Inspector
      inspectorId: 72
      inspectorSlug: ninjaone-inspector
    jmesPath: length(Users[?mfaConfigured == `true`])
    name: NinjaOne — Technician MFA Enabled Count
    notes: mfaConfigured is boolean. Use backtick-quoted `true`.
    resultType: integer
    sourceRecipe: recipes/single-system-analysis/by-inspector/ninjaone.md
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System A (inspected 2026-05-18) — returned 2

