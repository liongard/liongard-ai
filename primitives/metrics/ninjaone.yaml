"$schema": "../../schemas/primitive.schema.json"

primitives:

  - '@id': metrics:ninjaone:devices-total-count
    '@type': liongard:MetricPrimitive
    compliesWith:
    - CIS-Controls-v8:1.1
    dateAdded: '2026-05-26'
    description: Total number of devices managed by the NinjaOne tenant.
    evaluates:
      '@type': liongard:Inspector
      inspectorId: 72
      inspectorSlug: ninjaone-inspector
    jmesPath: length(Devices)
    name: NinjaOne — Total Device Count
    notes: 'Devices[].offline is boolean: false=online, true=offline.'
    resultType: integer
    sourceRecipe: recipes/single-system-analysis/by-inspector/ninjaone.md
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System A (inspected 2026-05-18) — returned 4

  - '@id': metrics:ninjaone:devices-online-count
    '@type': liongard:MetricPrimitive
    dateAdded: '2026-05-26'
    description: Number of devices currently online in the NinjaOne tenant.
    evaluates:
      '@type': liongard:Inspector
      inspectorId: 72
      inspectorSlug: ninjaone-inspector
    jmesPath: length(Devices[?offline == `false`])
    name: NinjaOne — Online Device Count
    notes: Devices.offline is boolean. Online = offline == `false`. Use backtick-quoted
      boolean.
    resultType: integer
    sourceRecipe: recipes/single-system-analysis/by-inspector/ninjaone.md
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System A (inspected 2026-05-18) — returned 4

  - '@id': metrics:ninjaone:patches-pending-count
    '@type': liongard:MetricPrimitive
    compliesWith:
    - CIS-Controls-v8:7.3
    - CIS-Controls-v8:7.4
    dateAdded: '2026-05-26'
    description: Total number of patches pending installation across all managed devices.
    evaluates:
      '@type': liongard:Inspector
      inspectorId: 72
      inspectorSlug: ninjaone-inspector
    jmesPath: N/A
    name: NinjaOne — Pending Patch Count
    notes: 'DATA GAP: NinjaOne dataprint has only Devices[], Users[], SystemInfo, DiskSummary,
      AntiVirusSummary. No Patches[], Alerts[], or Licensing data.'
    resultType: integer
    sourceRecipe: recipes/single-system-analysis/by-inspector/ninjaone.md
    status: PROPOSED
    validatedOn: '2026-05-28'
    validatedSystemReference: System A (inspected 2026-05-18) — no Patches[] array in
      dataprint

