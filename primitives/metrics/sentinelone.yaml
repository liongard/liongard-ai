      "@type": "liongard:Inspector"
      inspectorSlug: "sentinelone-inspector"
      inspectorId: 70
    jmesPath: "ThreatsSummary.resolved"
    resultType: "integer"
    resultUnit: "count"
    status: "VALIDATED"
    validatedOn: "2026-05-28"
