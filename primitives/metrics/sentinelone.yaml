# ── Console Users / Access ────────────────────────────────────────────────────

  - "@id": "metrics:sentinelone:console-users-without-mfa-list"
    "@type": "liongard:MetricPrimitive"
    name: "SentinelOne — Console Users Without MFA List"
    description: "Email addresses of console users where twoFaEnabled == false."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "sentinelone-inspector"
      inspectorId: 70
    liongardMetricName: "SentinelOne: Users Without MFA Enabled List"
    liongardMetricId: 1041
    liongardMetricUuid: "fceeec36-b6d8-496a-9eaf-21fb44147280"
    jmesPath: "Users[?twoFaEnabled==`false`].email"
    resultType: "array"
    fieldGotcha: "Users[].twoFaEnabled is BOOLEAN — spelling is 'twoFaEnabled' (camelCase, not 'twoFAEnabled' or '2faEnabled'). Users[] confirmed fields: id, email, fullName, scope, source, lastLogin, dateJoined, firstLogin, lowestRole, twoFaEnabled, daysSinceLastLogin, daysUntilApiExpiration."
    compliantWhen: "result == []"
    compliesWith:
      - "CIS-Controls-v8:6.3"
      - "cyber-insurance-domain-auth"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System A — dev environment"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/sentinelone.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:sentinelone:console-users-with-api-tokens-list"
    "@type": "liongard:MetricPrimitive"
    name: "SentinelOne — Console Users With API Tokens List"
    description: "Name:email joined strings for console users where apiToken != null. API tokens are attack surface — audit for service accounts."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "sentinelone-inspector"
      inspectorId: 70
    liongardMetricName: "SentinelOne: Users With API Tokens List"
    liongardMetricId: 1042
    liongardMetricUuid: "e6bbfb47-96ff-4149-97b3-da325da585d7"
    jmesPath: "Users[?apiToken!=`null`].join(`: `,[fullName, email])"
    resultType: "array"
    compliesWith:
      - "CIS-Controls-v8:5.4"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System A — dev environment"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/sentinelone.md"
    dateAdded: "2026-05-26"
