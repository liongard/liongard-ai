    description: "Count of confirmed-malicious threats not yet resolved from ThreatsSummary.maliciousNotResolved. Critical — must be 0."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "sentinelone-inspector"
      inspectorId: 70
    jmesPath: "ThreatsSummary.maliciousNotResolved"
    resultType: "integer"
    resultUnit: "count"
    compliantWhen: "result == 0"
    compliesWith:
      - "cyber-insurance-domain-endpoint"
    status: "VALIDATED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "Active system (inspected 2026-03-19)"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/sentinelone.md"
