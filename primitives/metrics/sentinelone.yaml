      inspectorSlug: "sentinelone-inspector"
      inspectorId: 70
    jmesPath: "ThreatsSummary.total"
    resultType: "integer"
    resultUnit: "count"
    fieldGotcha: "ThreatsSummary confirmed fields: total, resolved, inProgress, notResolved, notMitigated, maliciousNotResolved, suspiciousNotResolved, notMitigatedNotResolved, suspiciousNotMitigatedNotResolved — all integers."
    status: "VALIDATED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "Active system (inspected 2026-03-19)"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/sentinelone.md"
