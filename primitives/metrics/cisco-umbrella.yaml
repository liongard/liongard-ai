"$schema": "../../schemas/primitive.schema.json"

primitives:

  - "@id": "metrics:cisco-umbrella-inspector:roaming-client-count"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco Umbrella — Roaming Client Count"
    description: "Total number of Umbrella roaming clients deployed to endpoints in this sub-organization"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-umbrella-inspector"
      inspectorId: 32
    jmesPath: "length(roamingComputers)"
    resultType: "integer"
    status: "VALIDATED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "System A (inspected 2026-03-13)"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-umbrella.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:cisco-umbrella-inspector:virtual-appliance-count"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco Umbrella — Virtual Appliance Count"
    description: "Total number of on-prem Umbrella virtual appliances (DNS forwarders)"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-umbrella-inspector"
      inspectorId: 32
    jmesPath: "length(virtualAppliances)"
    resultType: "integer"
    status: "VALIDATED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "System A (inspected 2026-03-13)"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-umbrella.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:cisco-umbrella-inspector:network-count"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco Umbrella — Registered Network Count"
    description: "Total number of registered external networks in this sub-organization"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-umbrella-inspector"
      inspectorId: 32
    jmesPath: "length(networks)"
    resultType: "integer"
    status: "VALIDATED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "System A (inspected 2026-03-13)"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-umbrella.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:cisco-umbrella-inspector:internal-network-count"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco Umbrella — Internal Network Count"
    description: "Total number of internal network ranges defined in this sub-organization"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-umbrella-inspector"
      inspectorId: 32
    jmesPath: "length(internalNetworks)"
    resultType: "integer"
    status: "VALIDATED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "System A (inspected 2026-03-13)"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-umbrella.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:cisco-umbrella-inspector:site-count"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco Umbrella — Site Count"
    description: "Total number of sites/locations configured in this sub-organization"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-umbrella-inspector"
      inspectorId: 32
    jmesPath: "length(sites)"
    resultType: "integer"
    status: "VALIDATED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "System A (inspected 2026-03-13)"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-umbrella.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:cisco-umbrella-inspector:destination-list-count"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco Umbrella — Destination List Count"
    description: "Total number of custom allow/block destination lists in this sub-organization"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-umbrella-inspector"
      inspectorId: 32
    jmesPath: "destinationLists.meta.total"
    resultType: "integer"
    fieldGotcha: "destinationLists is an OBJECT {data: Array, meta: {total, page, limit}, status: {...}} — NOT a plain array. length(destinationLists) returns 3 (key count). Use destinationLists.meta.total for the entry count."
    status: "VALIDATED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "System A (inspected 2026-03-13)"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-umbrella.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:cisco-umbrella-inspector:console-user-count"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco Umbrella — Console User Count"
    description: "Total number of Umbrella console users in this sub-organization"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-umbrella-inspector"
      inspectorId: 32
    jmesPath: "length(users)"
    resultType: "integer"
    fieldGotcha: "Key is lowercase 'users' (not 'Users'). Each user entry has: id, role, email, roleId, status, lastname, firstname, timezone, twoFactorEnable (boolean)."
    status: "VALIDATED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "System A (inspected 2026-03-13)"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-umbrella.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:cisco-umbrella-inspector:console-users-no-mfa-count"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco Umbrella — Console Users Without MFA Count"
    description: "Number of Umbrella console users with two-factor authentication disabled"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-umbrella-inspector"
      inspectorId: 32
    jmesPath: "length(users[?twoFactorEnable == `false`])"
    resultType: "integer"
    compliantWhen: "== 0"
    fieldGotcha: "users[].twoFactorEnable is BOOLEAN (true/false), not a string. Use backtick-quoted boolean literal."
    status: "VALIDATED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "System A (inspected 2026-03-13)"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-umbrella.md"
    dateAdded: "2026-05-28"

  - "@id": "metrics:cisco-umbrella-inspector:stale-roaming-client-count"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco Umbrella — Stale Roaming Client Count"
    description: "Count of roaming clients that have not synced within 30 days (daysSinceLastSync_r > 30). Threshold is configurable."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-umbrella-inspector"
      inspectorId: 32
    jmesPath: "length(roamingComputers[?daysSinceLastSync_r > `30`])"
    resultType: "integer"
    compliantWhen: "== 0"
    fieldGotcha: "daysSinceLastSync_r is a Liongard-computed integer (days since last sync). Value 0 = synced today. Adjust threshold in recipe customize block."
    status: "VALIDATED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "System A (inspected 2026-03-13)"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-umbrella.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:cisco-umbrella-inspector:encrypted-roaming-client-count"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco Umbrella — Encrypted Roaming Client Count"
    description: "Count of roaming clients with encrypted DNS status"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-umbrella-inspector"
      inspectorId: 32
    jmesPath: "length(roamingComputers[?status == 'Encrypted'])"
    resultType: "integer"
    fieldGotcha: "roamingComputers[].status is a STRING. Confirmed values include 'Encrypted'. Use single-quoted string comparison."
    status: "VALIDATED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "System A (inspected 2026-03-13)"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-umbrella.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:cisco-umbrella-inspector:virtual-appliances-upgradable-count"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco Umbrella — Virtual Appliances Pending Upgrade Count"
    description: "Number of virtual appliances with a pending firmware/software upgrade available"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-umbrella-inspector"
      inspectorId: 32
    jmesPath: "virtualAppliances[?isUpgradable == `true`] | length(@)"
    resultType: "integer"
    compliantWhen: "== 0"
    fieldGotcha: "virtualAppliances[].isUpgradable is BOOLEAN. Use backtick-quoted boolean literal."
    status: "VALIDATED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "System A (inspected 2026-03-13)"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-umbrella.md"
    dateAdded: "2026-05-28"

  - "@id": "metrics:cisco-umbrella-inspector:virtual-appliance-inventory"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco Umbrella — Virtual Appliance Inventory"
    description: "Full list of virtual appliances with health, state, upgradability, and site association"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-umbrella-inspector"
      inspectorId: 32
    jmesPath: "virtualAppliances[*].{name: name, state: state, health: health, isUpgradable: isUpgradable, site: siteId}"
    resultType: "array"
    status: "SCHEMA_CONFIRMED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "System A (inspected 2026-03-13)"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-umbrella.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:cisco-umbrella-inspector:roaming-client-inventory"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco Umbrella — Roaming Client Inventory"
    description: "Full list of roaming clients with OS, version, encryption status, last sync, and days since sync"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-umbrella-inspector"
      inspectorId: 32
    jmesPath: "roamingComputers[*].{name: name, os: osVersionName, version: version, status: status, lastSync: lastSync, daysSinceSync: daysSinceLastSync_r}"
    resultType: "array"
    fieldGotcha: "status is a string (e.g. 'Encrypted'). daysSinceLastSync_r is Liongard-computed integer. osVersionName is a human-readable OS string."
    status: "SCHEMA_CONFIRMED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "System A (inspected 2026-03-13)"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-umbrella.md"
    dateAdded: "2026-05-26"
