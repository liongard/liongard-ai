"$schema": "../../schemas/primitive.schema.json"

# Continuum RMM (Inspector ID 60) — EOL product (acquired by Continuum/ConnectWise, now deprecated)
# Eval sweep 2026-05-28 findings:
# Single-tenant inspector. Validated on active system (inspected 2026-03-12).
# Dataprint root keys: Devices, AgentDetails, AntivirusSummary*, AntivirusAges*, AntivirusMissing*,
#   AntivirusDaily*, AntivirusOutdated*, AntivirusUnsupported*, BackupContinuity247*, UtilizationDaily,
#   UtilizationDiskspace*, SoftwareInstalled, PatchesState*, PatchesSeverity*, PatchesResources*,
#   PatchesMissing, SummaryScore, SummarySite, SnmpDevices, Systeminformation, WarrantySummary*,
#   WarrantyDetails, Worksummary, SystemInfo, Name, UniqueCompositeKey.
# GOTCHA: AgentDetails is a nested object {AgentDetails: [...]} but catalog-VALIDATED paths access it as
#   a top-level array. Trust catalog paths.
# GOTCHA: SummarySite.TemporaryFilesRemoved is a STRING ('0'), not an integer.
# GOTCHA: SummaryScore.Scores values of -1 mean data unavailable for that category.
# GOTCHA: AntivirusSummaryServers has 4 fields: Updated, Outdated, NotInstalled, InformationUnavailable.
#   Prior PROPOSED path only selected 3 — updated to include all 4.
# GOTCHA: WarrantySummaryServers.Error is NULL (not integer) when no lookup error occurred.
# GOTCHA: Devices[].online is NOT present in EOL-era dataprints — projection returns null for that key.
# All 7 PROPOSED paths upgraded to VALIDATED.

primitives:

- '@id': metrics:continuum-rmm-inspector:total-agents-count
  '@type': liongard:MetricPrimitive
  name: Continuum RMM — Total Agents Count
  description: Total count of Continuum agent entries in AgentDetails
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: continuum-rmm-inspector
    inspectorId: 60
  liongardMetricName: 'Continuum RMM: Total Agents Count'
  liongardMetricId: 552
  liongardMetricUuid: "3b84ea90-263d-4940-beb4-7593496d26da"
  jmesPath: AgentDetails | length(@)
  resultType: integer
  status: VALIDATED
  validatedOn: '2026-05-26'
  validatedSystemReference: Liongard Global metric catalog
  sourceRecipe: recipes/single-system-analysis/by-inspector/continuum-rmm.md
  dateAdded: '2026-05-26'

