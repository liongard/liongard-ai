- '@id': metrics:continuum-rmm-inspector:device-inventory
  '@type': liongard:MetricPrimitive
  name: Continuum RMM — Device Inventory (Last Known State)
  description: Device list with machineID, machineName, assetType, companyName, siteName,
    operatingSystem, online (null on EOL), lastSeenOnline, lastReboot
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: continuum-rmm-inspector
    inspectorId: 60
  jmesPath: 'Devices[].{machineID: machineID, machineName: machineName, assetType:
    assetType, companyName: companyName, siteName: siteName, operatingSystem: operatingSystem,
    online: online, lastSeenOnline: lastSeenOnline, lastReboot: lastReboot}'
  resultType: array
  fieldGotcha: 'Devices[] confirmed fields: machineID, machineName, friendlyName,
    hostName, assetType, companyId, companyName, siteId, siteName, operatingSystem,
    lastSeenOnline, lastReboot, ipAddresses, macAddresses, cpu, memoryTotal, etc.
    NOTE: ''online'' field is not present in older EOL-era dataprints — the projection
    returns null for that key.'
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: Active system (inspected 2026-03-12)
  sourceRecipe: recipes/single-system-analysis/by-inspector/continuum-rmm.md
  dateAdded: '2026-05-26'

