  liongardMetricId: 553
  liongardMetricUuid: "aa6a2706-7964-4d2e-84e4-d52530ee6348"
  jmesPath: SnmpDevices | length(@)
  resultType: integer
  status: VALIDATED
  validatedOn: '2026-05-26'
  validatedSystemReference: Liongard Global metric catalog
  sourceRecipe: recipes/single-system-analysis/by-inspector/continuum-rmm.md
  dateAdded: '2026-05-26'

- '@id': metrics:continuum-rmm-inspector:failed-or-stale-agents-list
  '@type': liongard:MetricPrimitive
  name: Continuum RMM — Failed or Stale Agents List
  description: Pipe-delimited list of agent FriendlyNames where DaysSinceLastContact
    exceeds 30 days
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: continuum-rmm-inspector
    inspectorId: 60
  liongardMetricName: 'Continuum RMM: Failed or Stale Agents List'
  liongardMetricId: 836
  liongardMetricUuid: "253baf6a-eec4-41a5-a742-6194e198f5bd"
  jmesPath: AgentDetails[?DaysSinceLastContact_r > `30`].FriendlyName | join( `|`
    , @)
  resultType: string
  status: VALIDATED
  validatedOn: '2026-05-26'
  validatedSystemReference: Liongard Global metric catalog
  sourceRecipe: recipes/single-system-analysis/by-inspector/continuum-rmm.md
  dateAdded: '2026-05-26'

- '@id': metrics:continuum-rmm-inspector:failed-or-stale-agents-count
