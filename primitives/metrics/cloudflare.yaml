  - '@id': metrics:cloudflare-inspector:account-name
    '@type': liongard:MetricPrimitive
    name: Cloudflare — Account Name
    description: Human-readable Cloudflare account name.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: cloudflare-inspector
      inspectorId: 82
    jmesPath: AccountInfo.name
    resultType: string
    status: VALIDATED
    validatedOn: '2026-05-29'
    validatedSystemReference: System A — dev environment (cloudflare child, inspected 2026-03-13)
    sourceRecipe: recipes/single-system-analysis/by-inspector/cloudflare.md
