  - '@id': metrics:cloudflare-inspector:account-type
    '@type': liongard:MetricPrimitive
    name: Cloudflare — Account Type
    description: Account tier/type (e.g., standard, enterprise).
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: cloudflare-inspector
      inspectorId: 82
    jmesPath: AccountInfo.type
    resultType: string
    status: VALIDATED
    validatedOn: '2026-05-29'
    validatedSystemReference: System A — dev environment (cloudflare child, inspected 2026-03-13)
    sourceRecipe: recipes/single-system-analysis/by-inspector/cloudflare.md
    dateAdded: '2026-05-29'

  - '@id': metrics:cloudflare-inspector:members-super-admin-count
    '@type': liongard:MetricPrimitive
    name: Cloudflare — Super Administrator Members Count
    description: Count of members holding a Super Administrator role. Least-privilege signal.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: cloudflare-inspector
      inspectorId: 82
    jmesPath: length(Members[?roles[?contains(name, 'Super Administrator')]])
    resultType: integer
    resultUnit: count
    status: VALIDATED
    validatedOn: '2026-05-29'
    validatedSystemReference: System A — dev environment (cloudflare child, inspected 2026-03-13)
    compliesWith:
    - CIS-Controls-v8:6.8
    sourceRecipe: recipes/single-system-analysis/by-inspector/cloudflare.md
    dateAdded: '2026-05-29'

  - '@id': metrics:cloudflare-inspector:zones-list
    '@type': liongard:MetricPrimitive
    name: Cloudflare — Zones List
    description: Per-zone name, status, and plan name.
    evaluates:
      '@type': liongard:Inspector
