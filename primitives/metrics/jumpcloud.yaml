"$schema": "../../schemas/primitive.schema.json"

primitives:

  - '@id': metrics:jumpcloud:systems-with-failed-policies-list
    '@type': liongard:MetricPrimitive
    name: JumpCloud — Systems With Failed Policies List
    description: Names of systems where one or more JumpCloud policies are in a non-success
      state.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: jumpcloud-inspector
      inspectorId: 68
    liongardMetricName: 'JumpCloud: Systems with Failed Policies List'
    liongardMetricId: 1017
    liongardMetricUuid: "15930a5e-6c55-4c93-a511-76e4236477b3"
    jmesPath: Policies.PolicyResults[?state  != `success`].systemName_r | join(`, `,
      @)
    resultType: string
    compliantWhen: length == 0
    status: VALIDATED
    validatedOn: '2026-05-26'
    validatedSystemReference: Liongard Global metric catalog
    sourceRecipe: recipes/single-system-analysis/by-inspector/jumpcloud.md
    dateAdded: '2026-05-26'

  - '@id': metrics:jumpcloud:systems-with-failed-commands-list
