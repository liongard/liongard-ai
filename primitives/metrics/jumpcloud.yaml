  - '@id': metrics:jumpcloud:users-total-count
    '@type': liongard:MetricPrimitive
    name: JumpCloud — Total User Count
    description: Total number of user accounts in the JumpCloud organization. Pseudo-metric
      path 'jumpcloud.users.totalCount' replaced with validated JMESPath. Excludes null
      ghost entries.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: jumpcloud-inspector
      inspectorId: 68
    jmesPath: length(Users[?status != null])
    resultType: integer
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System O (child) — Completed 2026-03-13
    sourceRecipe: recipes/single-system-analysis/by-inspector/jumpcloud.md
    dateAdded: '2026-05-26'

  - '@id': metrics:jumpcloud:users-enabled-count
    '@type': liongard:MetricPrimitive
    name: JumpCloud — Enabled User Count
    description: 'Number of enabled user accounts in the JumpCloud organization. Active
      user state: activated==true AND suspended!=true. Pseudo-metric path replaced.'
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: jumpcloud-inspector
      inspectorId: 68
    jmesPath: length(Users[?activated == `true` && suspended != `true`])
    resultType: integer
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System O (child) — Completed 2026-03-13
    sourceRecipe: recipes/single-system-analysis/by-inspector/jumpcloud.md
    dateAdded: '2026-05-26'

  - '@id': metrics:jumpcloud:users-admin-count
    '@type': liongard:MetricPrimitive
    name: JumpCloud — Admin User Count
    description: Number of admin accounts in the JumpCloud organization. Admin flag
      is Users[].sudo (boolean). Pseudo-metric path replaced.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: jumpcloud-inspector
      inspectorId: 68
    jmesPath: length(Users[?sudo == `true`])
    resultType: integer
    compliesWith:
    - CIS-Controls-v8:5.4
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System O (child) — Completed 2026-03-13
    sourceRecipe: recipes/single-system-analysis/by-inspector/jumpcloud.md
    dateAdded: '2026-05-26'

  - '@id': metrics:jumpcloud:users-mfa-enabled-count
    '@type': liongard:MetricPrimitive
    name: JumpCloud — MFA Enabled User Count
    description: Number of JumpCloud users with MFA enrolled. Primary MFA field is enable_user_portal_multifactor
      (boolean). Pseudo-metric path replaced.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: jumpcloud-inspector
      inspectorId: 68
    jmesPath: length(Users[?enable_user_portal_multifactor == `true`])
    resultType: integer
    compliantWhen: == enabled user count
    compliesWith:
    - CIS-Controls-v8:6.3
    - CIS-Controls-v8:6.5
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System O (child) — Completed 2026-03-13
    sourceRecipe: recipes/single-system-analysis/by-inspector/jumpcloud.md
    dateAdded: '2026-05-26'

