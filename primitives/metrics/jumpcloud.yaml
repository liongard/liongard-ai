  - '@id': metrics:jumpcloud:sso-apps-no-users-count
    '@type': liongard:MetricPrimitive
    name: JumpCloud — SSO Apps With No Users Count
    description: Number of SSO application integrations with no users assigned (orphaned
      integrations). Applications.Applications[] array confirmed; UserCount field not
      directly verified. Pseudo-metric path replaced.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: jumpcloud-inspector
      inspectorId: 68
    jmesPath: length(Applications.Applications[?UserCount == `0`])
    resultType: integer
    compliantWhen: == 0
    status: SCHEMA_CONFIRMED
    validatedOn: '2026-05-28'
    validatedSystemReference: System O (child) — Completed 2026-03-13
    sourceRecipe: recipes/single-system-analysis/by-inspector/jumpcloud.md
    dateAdded: '2026-05-26'

  - '@id': metrics:jumpcloud:password-policy-min-length
    '@type': liongard:MetricPrimitive
    name: JumpCloud — Password Policy Minimum Length
    description: Minimum password length configured in the JumpCloud organization password
      policy. Password policy is at SystemInfo.settings.passwordPolicy (22-field object).
      Pseudo-metric path replaced.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: jumpcloud-inspector
      inspectorId: 68
    jmesPath: SystemInfo.settings.passwordPolicy.minlength
    resultType: integer
    compliantWhen: '>= slas.password_policy_min_length'
    compliesWith:
    - CIS-Controls-v8:5.2
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System O (child) — Completed 2026-03-13
    sourceRecipe: recipes/single-system-analysis/by-inspector/jumpcloud.md
    dateAdded: '2026-05-26'

