      replaced.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: jumpcloud-inspector
      inspectorId: 68
    jmesPath: length(Applications.Applications)
    resultType: integer
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System O (child) — Completed 2026-03-13
    sourceRecipe: recipes/single-system-analysis/by-inspector/jumpcloud.md
