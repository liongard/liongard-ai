# ── Appliance Health ──────────────────────────────────────────────────────────

  - "@id": "metrics:axcient-x360-recover:appliance-health-status"
    "@type": "liongard:MetricPrimitive"
    name: "Axcient x360 Recover — Appliance Health Status"
    description: "Health status for each Axcient appliance from Appliances[].health_status. Every entry should be 'healthy'. Non-healthy appliances require immediate escalation."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "axcient-x360-recover-inspector"
      inspectorId: 100
    liongardMetricName: "Axcient: Appliance Health Status"
    liongardMetricId: 78701
    liongardMetricUuid: "af12aae4-d40a-4e4d-8124-9c5289d9d30b"
    jmesPath: "Appliances[].health_status"
    resultType: "array"
    compliantWhen: "all entries == 'healthy'"
    compliesWith:
      - "CIS-Controls-v8:11.1"
      - "cyber-insurance-domain-backup"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    fieldGotcha: "Catalog inspector slug is 'axcient-x360recover-inspector' (no hyphen before 'recover') but the recipe references 'axcient-x360-recover-inspector'. Confirm the slug in liongard_launchpoint LIST before use."
    sourceRecipe: "recipes/single-system-analysis/by-inspector/axcient-x360-recover.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:axcient-x360-recover:appliance-health-status-reason"
    "@type": "liongard:MetricPrimitive"
    name: "Axcient x360 Recover — Appliance Health Status Reason"
    description: "Reason codes for appliance health status from Appliances[].health_status_reason. Provides context when health_status is not 'healthy'."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "axcient-x360-recover-inspector"
      inspectorId: 100
    liongardMetricName: "Axcient: Appliance Health Status Reason"
    liongardMetricId: 78702
    liongardMetricUuid: "8a1488a9-12a3-4d22-9691-08850d07f4c3"
    jmesPath: "Appliances[].health_status_reason"
    resultType: "array"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/axcient-x360-recover.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:axcient-x360-recover:appliance-drive-usage-percent"
    "@type": "liongard:MetricPrimitive"
    name: "Axcient x360 Recover — Appliance Drive Usage Percent"
    description: "Calculated drive utilization percentage per appliance using percent_of(storage_details.used_size, storage_details.drive_size). May be null when drive_size is not populated."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "axcient-x360-recover-inspector"
      inspectorId: 100
    liongardMetricName: "Axcient: Appliance Drive Usage Percent"
    liongardMetricId: 78709
    liongardMetricUuid: "b210e85d-4919-4486-b0e5-f093824f2f2f"
    jmesPath: "map(&percent_of(storage_details.used_size, storage_details.drive_size), Appliances)"
    resultType: "array"
    resultUnit: "percent"
    fieldGotcha: "Returns null entries when storage_details.drive_size is not populated on a given appliance — common for some deployment types. Manual confirmation in the Axcient portal is required when drive_size is null."
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/axcient-x360-recover.md"
    dateAdded: "2026-05-26"

