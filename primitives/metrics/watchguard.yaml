# ── Licensing & Subscriptions ─────────────────────────────────────────────────

  - "@id": "metrics:watchguard:features-expiring-30d-count"
    "@type": "liongard:MetricPrimitive"
    name: "WatchGuard — Features Expiring Within 30 Days Count"
    description: "Count of licensed features (TSS, GAV, IPS, WebBlocker, etc.) with DaysUntilExpiration_r <= 30. Non-zero triggers an immediate renewal action."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "watchguard-inspector"
      inspectorId: 29
    liongardMetricName: "WatchGuard: Features within 30 Days of License Expiration Count"
    liongardMetricId: 889
    liongardMetricUuid: "8cb8c636-d56c-4d8a-90a7-4702057b3eb3"
    jmesPath: "Features[?DaysUntilExpiration_r <= '30'] | length(@)"
    resultType: "integer"
    resultUnit: "count"
    compliantWhen: "result == 0"
    compliesWith:
      - "CIS-Controls-v8:12.2"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    fieldGotcha: "DaysUntilExpiration_r is a resolved/computed string field — filter uses string comparison '<= 30' not numeric. Confirm behavior when value is exactly 30."
    sourceRecipe: "recipes/single-system-analysis/by-inspector/watchguard.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:watchguard:features-expiring-30d-list"
    "@type": "liongard:MetricPrimitive"
    name: "WatchGuard — Features Expiring Within 30 Days List"
    description: "Feature names and expiration dates for licensed features expiring within 30 days. Companion list for the expiration count metric."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "watchguard-inspector"
      inspectorId: 29
    liongardMetricName: "WatchGuard: Features within 30 Days of License Expiration List"
    liongardMetricId: 888
    liongardMetricUuid: "941ffaf6-dda2-4770-a712-a4a091fbbc3f"
    jmesPath: "Features[?DaysUntilExpiration_r <= '30'].[Feature,Expiration]"
    resultType: "array"
    compliantWhen: "result == []"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/watchguard.md"
    dateAdded: "2026-05-26"

# ── Account & Admin Security ──────────────────────────────────────────────────

  - "@id": "metrics:watchguard:account-lockout-disabled-count"
    "@type": "liongard:MetricPrimitive"
    name: "WatchGuard — Account Lockout Disabled Count"
    description: "Count of account lockout settings where status is not 'Enabled'. Non-zero means lockout is not enforced, leaving admin accounts open to brute-force."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "watchguard-inspector"
      inspectorId: 29
    liongardMetricName: "WatchGuard: Account Lockout Disabled Count"
    liongardMetricId: 885
    liongardMetricUuid: "465e834e-7cd2-43de-9c7d-f44f1a7ecfae"
    jmesPath: "SystemInfo.AccountLockoutSettings[?Status != 'Enabled'] |length(@)"
    resultType: "integer"
    resultUnit: "count"
    compliantWhen: "result == 0"
    compliesWith:
      - "CIS-Controls-v8:5.2"
      - "cyber-insurance-domain-auth"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/watchguard.md"
    dateAdded: "2026-05-26"

