    description: "Firewall system name from SystemInfo.SystemName. Used for asset identification and report headers."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "watchguard-inspector"
      inspectorId: 29
    liongardMetricName: "Watchguard: Hostname"
    liongardMetricId: 1999
    liongardMetricUuid: "ab839c00-30aa-11ee-be56-0242ac120002"
    jmesPath: "SystemInfo.SystemName"
    resultType: "string"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/watchguard.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:watchguard:model"
