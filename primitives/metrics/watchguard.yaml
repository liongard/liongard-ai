    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/watchguard.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:watchguard:interface-summary"
