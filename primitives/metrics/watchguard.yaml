  - "@id": "metrics:watchguard:down-interfaces-count"
    "@type": "liongard:MetricPrimitive"
    name: "WatchGuard — Down Interfaces Count"
    description: "Count of enabled interfaces where status is not 'Up'. A non-zero count warrants investigation for connectivity or configuration problems."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "watchguard-inspector"
      inspectorId: 29
    liongardMetricName: "WatchGuard: Down Interfaces Count"
    liongardMetricId: 883
    liongardMetricUuid: "f287894a-7d50-4f96-9bdb-c7fca5b409b8"
    jmesPath: "Interfaces[?Enabled == 'yes' && Status != 'Up'] | length(@)"
    resultType: "integer"
    resultUnit: "count"
    compliantWhen: "result == 0"
    compliesWith:
      - "CIS-Controls-v8:12.1"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/watchguard.md"
    dateAdded: "2026-05-26"

