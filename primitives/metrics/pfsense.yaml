"$schema": "../../schemas/primitive.schema.json"

primitives:

# ── Device Identity ───────────────────────────────────────────────────────────

  - "@id": "metrics:pfsense:software-version"
    "@type": "liongard:MetricPrimitive"
    name: "pfSense — Software Version"
    description: "Running pfSense version number from SystemInfo.version (float, e.g. 19.1). Distinguishes Community Edition from pfSense Plus and tracks firmware currency."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "pfsense-inspector"
      inspectorId: 37
    liongardMetricName: "pfSense: Software Version"
    liongardMetricId: 231
    liongardMetricUuid: "cd99511b-94c3-4f8e-83dd-eb04fd0644ea"
    jmesPath: "SystemInfo.version"
    resultType: "float"
    fieldGotcha: "SystemInfo.version is a FLOAT (e.g., 19.1), not a string. Prior resultType 'string' was incorrect. Do not use string comparison on this field."
    status: "VALIDATED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "System R (inspected 2026-03-13) — 19.1 (float)"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/pfsense.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:pfsense:time-servers"
    "@type": "liongard:MetricPrimitive"
    name: "pfSense — Configured Time Servers (NTP)"
    description: "NTP time server addresses configured on the appliance from SystemInfo.timeservers. Accurate time is required for VPN, certificates, and log correlation."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "pfsense-inspector"
      inspectorId: 37
    liongardMetricName: "pfSense: Time Servers"
    liongardMetricId: 230
    liongardMetricUuid: "7f057ad5-ea64-438f-8f75-1d5a53ea928e"
    jmesPath: "SystemInfo.timeservers"
    resultType: "string"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/pfsense.md"
    dateAdded: "2026-05-26"

