- '@id': metrics:slack:active-users-count
  '@type': liongard:MetricPrimitive
  name: Slack — Active Non-Bot User Count
  description: Count of active, non-deleted, non-bot users. Extended version of catalog
    metric 1147/1148 with accurate active-user filter.
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: slack-inspector
    inspectorId: 66
  jmesPath: Users[?deleted == `false` && is_bot == `false`] | length(@)
  resultType: integer
  fieldGotcha: 'Users[].deleted is BOOLEAN (true=deactivated). Users[].is_bot is BOOLEAN.
    Users[].is_restricted (multi-channel guest) and is_ultra_restricted (single-channel
    guest) are also BOOLEAN. NOTE: Groups[] key does NOT exist in the Slack dataprint
    — user groups cannot be counted via JMESPath.'
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: Active system (inspected 2026-04-30)
  sourceRecipe: recipes/single-system-analysis/by-inspector/slack.md
  dateAdded: '2026-05-26'

