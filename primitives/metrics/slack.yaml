"$schema": "../../schemas/primitive.schema.json"

# Slack (Inspector ID 66)
# Eval sweep 2026-05-28 findings:
# Single-tenant inspector. Validated on active system (inspected 2026-04-30).
# Dataprint root keys: Name, Users, Profile, SystemInfo, BillableInfo, Conversations, UniqueCompositeKey.
# GOTCHA: Groups[] key does NOT exist in the Slack dataprint — user-groups-count primitive removed (data gap).
# GOTCHA: Users[].deleted is BOOLEAN (true = deactivated user).
# GOTCHA: Users[].is_bot is BOOLEAN.
# GOTCHA: Users[].is_restricted (multi-channel guest) and is_ultra_restricted (single-channel guest) are BOOLEAN.
# All 7 prior PROPOSED paths validated: 6 confirmed, 1 removed (Groups[] data gap).

primitives:

- '@id': metrics:slack:admin-users-count
  '@type': liongard:MetricPrimitive
  name: Slack — Admin Users Count
  description: Total count of workspace admin users (includes deleted users). Use
    extended query with deleted == false filter for accurate security posture.
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: slack-inspector
    inspectorId: 66
  liongardMetricName: 'Slack: Admin Users Count'
  liongardMetricId: 1145
  liongardMetricUuid: "3d5731c7-2dbf-4aeb-8bfc-22fab67b4668"
  jmesPath: Users[?is_admin == `true`] | length(@)
  resultType: integer
  compliantWhen: <= slas.admin_user_count_max
  compliesWith:
  - CIS-Controls-v8:5.4
  - CIS-Controls-v8:6.8
  status: VALIDATED
  validatedOn: '2026-05-26'
  validatedSystemReference: Liongard Global metric catalog
  sourceRecipe: recipes/single-system-analysis/by-inspector/slack.md
  dateAdded: '2026-05-26'

