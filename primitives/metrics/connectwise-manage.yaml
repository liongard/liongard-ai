    description: Total number of technician members in the ConnectWise Manage tenant.
    evaluates:
      '@type': liongard:Inspector
      inspectorId: 9
      inspectorSlug: connectwise-manage-inspector
    jmesPath: length(Members)
    name: ConnectWise Manage — Total Member Count
    notes: 'Members[] is the technician/staff roster. inactiveFlag is boolean. GOTCHA:
      status and securityRole are objects with a ''name'' sub-key — filter as status.name
      == ''Active'', securityRole.name == ''Admin''.'
    resultType: integer
    sourceRecipe: recipes/single-system-analysis/by-inspector/connectwise-manage.md
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: 'System A (dev environment, inspected 2026-05-28) — returned
      32'

