    evaluates:
      '@type': liongard:Inspector
      inspectorId: 9
      inspectorSlug: connectwise-manage-inspector
    jmesPath: N/A
    name: ConnectWise Manage — Open Ticket Count
    notes: 'DATA GAP: CW Manage dataprint captures Companies, Members, Configurations,
      Boards — not ticket/SLA/agreement/time-entry data. No Tickets[] array in dataprint.
      Requires a Liongard metric request.'
    resultType: integer
    sourceRecipe: recipes/single-system-analysis/by-inspector/connectwise-manage.md
