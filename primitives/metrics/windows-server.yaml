  - '@id': metrics:windows-server:available-updates-count
    '@type': liongard:MetricPrimitive
    name: Windows Server — Available Updates Count
    description: Count of pending (not yet installed) Windows updates from AvailableUpdates[].
      No Liongard Global metric exists for this path on Windows Server — PROPOSED pending
      ROAR ticket.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: windows-server-inspector
      inspectorId: 25
    jmesPath: length(AvailableUpdates)
    resultType: integer
    resultUnit: count
    compliantWhen: result == 0
    compliesWith:
    - CIS-Controls-v8:7.3
    status: VALIDATED
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'
    validatedOn: '2026-05-28'
    validatedSystemReference: System E — Windows Server 2025, Completed 2026-05-18

  - '@id': metrics:windows-server:mandatory-updates-count
    '@type': liongard:MetricPrimitive
    name: Windows Server — Mandatory Updates Pending Count
    description: Count of pending updates where IsMandatory == true. No Liongard Global
      metric for Windows Server (Windows Workstation inspector has Global metric id=1574
      for this path). IsMandatory is a boolean field in AvailableUpdates[].
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: windows-server-inspector
      inspectorId: 25
    jmesPath: AvailableUpdates[?IsMandatory] | length(@)
    resultType: integer
    resultUnit: count
    compliantWhen: result == 0
    compliesWith:
    - CIS-Controls-v8:7.3
    - cyber-insurance-domain-endpoint
    status: VALIDATED
    validatedOn: '2026-05-29'
    validatedSystemReference: "System A (inspected 2026-05-18) — AvailableUpdates[0].IsMandatory\
      \ confirmed as boolean (value: false); filter evaluates correctly, returns integer\
      \ 0"
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'

