    liongardMetricId: 511
    liongardMetricUuid: "914da1c9-1af1-4289-813d-d6d9bac0f105"
    jmesPath: Users[?Admin && LocalAccount].Name | sort(@)
    resultType: array
    compliesWith:
    - CIS-Controls-v8:5.4
