    - CIS-Controls-v8:7.3
    - cyber-insurance-domain-endpoint
    status: VALIDATED
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'
    validatedOn: '2026-05-28'
    validatedSystemReference: System E — Windows Server 2025, Completed 2026-05-18

  - '@id': metrics:windows-server:local-admin-list
    '@type': liongard:MetricPrimitive
