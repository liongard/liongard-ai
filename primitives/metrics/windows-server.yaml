    name: Windows Server — Installed Roles List
    description: Comma-joined string of installed Windows Server roles from Roles[?Installed].Name.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: windows-server-inspector
      inspectorId: 25
    liongardMetricName: 'Windows: Installed Roles List'
    liongardMetricId: 203
    liongardMetricUuid: "2e2db9a4-c6b3-448d-af29-66afef5e27dd"
    jmesPath: Roles[?Installed].Name | join(', ' @)
    resultType: string
    status: VALIDATED
    validatedOn: '2026-05-26'
    validatedSystemReference: Liongard Global metric catalog
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'

  - '@id': metrics:windows-server:file-share-count
    '@type': liongard:MetricPrimitive
    name: Windows Server — File Share Count
    description: Total number of file shares configured on the server from length(Shares).
    evaluates:
