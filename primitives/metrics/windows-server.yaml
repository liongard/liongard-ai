  - '@id': metrics:windows-server:all-drives-encrypted
    '@type': liongard:MetricPrimitive
    name: Windows Server — All Fixed Drives Encrypted
    description: True if all Fixed drives have BitlockerStatus == 'Fully Encrypted'.
      Compares encrypted count to total fixed count.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: windows-server-inspector
      inspectorId: 25
    liongardMetricName: 'Windows Server: All Drives Encrypted'
    liongardMetricId: 2093
    liongardMetricUuid: "615bffdd-9b36-4368-a3d0-25a49cef7b02"
    jmesPath: length(Drives[?Type == 'Fixed' && BitlockerStatus == 'Fully Encrypted'])
      == length(Drives[?Type == 'Fixed'])
    resultType: boolean
    compliantWhen: result == true
    compliesWith:
    - CIS-Controls-v8:3.6
    - cyber-insurance-domain-endpoint
    status: VALIDATED
    validatedOn: '2026-05-26'
    validatedSystemReference: Liongard Global metric catalog
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'

  - '@id': metrics:windows-server:all-drives-encrypted-protected
    '@type': liongard:MetricPrimitive
    name: Windows Server — All Fixed Drives Encrypted and Protected
    description: True if all Fixed drives are Fully Encrypted AND ProtectionStatus ==
      'Protected'. Stricter than all-drives-encrypted — prefer for cyber insurance evidence.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: windows-server-inspector
      inspectorId: 25
    liongardMetricName: 'Windows Server: All Drives Encrypted and Protected'
    liongardMetricId: 82406
    liongardMetricUuid: "3944dd17-911c-4e4c-bbfa-fd70193855d6"
    jmesPath: length(Drives[?Type == 'Fixed' && BitlockerStatus == 'Fully Encrypted'
      && ProtectionStatus == 'Protected']) == length(Drives[?Type == 'Fixed'])
    resultType: boolean
    compliantWhen: result == true
    compliesWith:
    - CIS-Controls-v8:3.6
    - cyber-insurance-domain-endpoint
    status: VALIDATED
    validatedOn: '2026-05-26'
    validatedSystemReference: Liongard Global metric catalog
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'

  - '@id': metrics:windows-server:drives-bitlocker-status
