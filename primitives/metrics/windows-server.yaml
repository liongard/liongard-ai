      inspectorSlug: windows-server-inspector
      inspectorId: 25
    liongardMetricName: 'Windows Server: Public Firewall Enabled'
    liongardMetricId: 2089
    liongardMetricUuid: "1e059d03-7804-44cd-8b61-0bc47a703662"
    jmesPath: Firewall.Public
    resultType: boolean
    compliantWhen: result == true
    compliesWith:
    - CIS-Controls-v8:4.5
