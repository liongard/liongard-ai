      inspectorSlug: windows-server-inspector
      inspectorId: 25
    liongardMetricName: 'Windows Server: File Share Count'
    liongardMetricId: 26
    liongardMetricUuid: "d293f608-f10c-4fe0-b4e2-70195794ab7a"
    jmesPath: length(Shares)
    resultType: integer
    resultUnit: count
    status: VALIDATED
    validatedOn: '2026-05-26'
    validatedSystemReference: Liongard Global metric catalog
