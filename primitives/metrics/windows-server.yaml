    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System E — Windows Server 2025, Completed 2026-05-18
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'

  - '@id': metrics:windows-server:antivirus-list
    '@type': liongard:MetricPrimitive
    name: Windows Server — Antivirus Software List
    description: Names of antivirus products installed on the server from AntivirusSoftware[].Name.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: windows-server-inspector
      inspectorId: 25
    liongardMetricName: 'Windows Server: Antivirus on System'
    liongardMetricId: 1964
    liongardMetricUuid: "55552e84-1131-4ee2-9fcc-612efff71212"
    jmesPath: AntivirusSoftware[].Name
    resultType: array
    compliantWhen: result != []
    compliesWith:
    - CIS-Controls-v8:10.1
    - cyber-insurance-domain-endpoint
    status: VALIDATED
    validatedOn: '2026-05-26'
    validatedSystemReference: Liongard Global metric catalog
    fieldGotcha: Windows Server exposes AV via AntivirusSoftware[].Name. Windows Workstation
      exposes AV via AVs[].Name. These are different top-level keys — do not swap between
      inspector types.
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'

