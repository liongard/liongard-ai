    dateAdded: '2026-05-26'

  - '@id': metrics:windows-server:domain-firewall-enabled
    '@type': liongard:MetricPrimitive
    name: Windows Server — Domain Firewall Enabled
    description: Whether the Windows Firewall Domain profile is enabled. Boolean from
      Network.FirewallInfo.Domain.Enabled. Correct top-level path is Firewall.Domain
      (bool). Network.FirewallInfo.Domain.Enabled returns null.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: windows-server-inspector
      inspectorId: 25
    liongardMetricName: 'Windows Server: Domain Firewall Enabled'
    liongardMetricId: 2087
    liongardMetricUuid: "39d7c9f6-5a2d-4dd2-87d6-bf7fa84b3713"
    jmesPath: Firewall.Domain
    resultType: boolean
    compliantWhen: result == true
    compliesWith:
    - CIS-Controls-v8:4.5
    - cyber-insurance-domain-endpoint
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System E — Windows Server 2025, Completed 2026-05-18
    fieldGotcha: Windows Server firewall path is Network.FirewallInfo.Domain.Enabled
      (nested under Network). Windows Workstation uses Firewall.Domain (top-level).
      Do not swap these between inspector types.
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'

  - '@id': metrics:windows-server:private-firewall-enabled
    '@type': liongard:MetricPrimitive
    name: Windows Server — Private Firewall Enabled
    description: Whether the Windows Firewall Private profile is enabled from Network.FirewallInfo.Private.Enabled.
      Correct path is Firewall.Private. Network.FirewallInfo.Private.Enabled returns
      null.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: windows-server-inspector
      inspectorId: 25
    liongardMetricName: 'Windows Server: Private Firewall Enabled'
    liongardMetricId: 2088
    liongardMetricUuid: "2b7878b6-cc73-4729-9923-c90ea5b4ce45"
    jmesPath: Firewall.Private
    resultType: boolean
    compliantWhen: result == true
    compliesWith:
    - CIS-Controls-v8:4.5
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System E — Windows Server 2025, Completed 2026-05-18
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'

  - '@id': metrics:windows-server:public-firewall-enabled
    '@type': liongard:MetricPrimitive
