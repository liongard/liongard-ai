  - '@id': metrics:windows-server:rdp-config
    '@type': liongard:MetricPrimitive
    name: Windows Server — RDP Configuration
    description: Full RemoteDesktopConfig object. Check .Settings.RDP for status string;
      'RDP connections are not allowed' means disabled.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: windows-server-inspector
      inspectorId: 25
    liongardMetricName: 'Windows Server: RDP Allowed'
    liongardMetricId: 2164
    liongardMetricUuid: "70fb0686-951d-11ee-b9d1-0242ac120002"
    jmesPath: RemoteDesktopConfig
    resultType: object
    compliesWith:
    - cyber-insurance-domain-endpoint
    status: VALIDATED
    validatedOn: '2026-05-26'
    validatedSystemReference: Liongard Global metric catalog
    fieldGotcha: Windows Server uses RemoteDesktopConfig (object) — NOT OS.RDPEnabled
      (boolean). OS.RDPEnabled exists on Windows Workstation inspector only. Parse RemoteDesktopConfig.Settings.RDP
      for the readable status string.
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'

  - '@id': metrics:windows-server:warranty-active
    '@type': liongard:MetricPrimitive
    name: Windows Server — Warranty Is Active
    description: Boolean — true if time_until(Warranty.WarrantyExpirationDate, 'days')
      > 0.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: windows-server-inspector
      inspectorId: 25
    liongardMetricName: 'Windows Server: Machine Warranty is Active'
    liongardMetricId: 1788
    liongardMetricUuid: "77739678-014d-11ed-b939-0242ac120002"
    jmesPath: time_until(Warranty.WarrantyExpirationDate, 'days') > `0`
    resultType: boolean
    compliantWhen: result == true
    status: VALIDATED
    validatedOn: '2026-05-26'
    validatedSystemReference: Liongard Global metric catalog
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'

  - '@id': metrics:windows-server:warranty-days-remaining
    '@type': liongard:MetricPrimitive
    name: Windows Server — Days Until Warranty Expiration
    description: Days until machine warranty expires, via time_until(Warranty.WarrantyExpirationDate,
      'days').
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: windows-server-inspector
      inspectorId: 25
    liongardMetricName: 'Windows Server: Days Until Machine Warranty Expiration'
    liongardMetricId: 1789
    liongardMetricUuid: "a1189168-014d-11ed-b939-0242ac120002"
    jmesPath: time_until(Warranty.WarrantyExpirationDate, 'days')
    resultType: integer
    resultUnit: days
    compliantWhen: result > slas.warranty_warn_days (default 90)
    status: VALIDATED
    validatedOn: '2026-05-26'
    validatedSystemReference: Liongard Global metric catalog
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
