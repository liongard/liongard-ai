    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'

  - '@id': metrics:windows-server:dns-filters-list
    '@type': liongard:MetricPrimitive
    name: Windows Server — DNS Filter Software List
    description: Names of DNS filtering products (Zscaler, Cloudflare WARP, Umbrella,
      NordLayer, DNSFilter) detected in installed software.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: windows-server-inspector
      inspectorId: 25
    liongardMetricName: 'Windows Server: DNS Filters Installed'
    liongardMetricId: 2098
    liongardMetricUuid: "fbf6ff20-e9de-4533-bcf6-a6d627f1ebca"
    jmesPath: Software[?contains(Name, `Zscaler`) || contains(Name, `Cloudflare WARP`)
      || contains(Name, `Umbrella Roaming Client`) || contains(Name, `Nordlayer`) ||
      contains(Name, `DNSFilter Agent`)].Name
    resultType: array
    status: VALIDATED
    validatedOn: '2026-05-26'
    validatedSystemReference: Liongard Global metric catalog
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
