    liongardMetricId: 1637
    liongardMetricUuid: "a86b9bef-8b1d-4d9a-8cde-b346feee8a58"
    jmesPath: InstalledUpdates[?Status == 'Failed'].Name | length(@)
    resultType: integer
    resultUnit: count
    compliantWhen: result == 0
    compliesWith:
    - CIS-Controls-v8:7.3
    status: VALIDATED
    validatedOn: '2026-05-26'
    validatedSystemReference: Liongard Global metric catalog
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'

