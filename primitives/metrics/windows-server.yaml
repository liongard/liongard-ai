"$schema": "../../schemas/primitive.schema.json"

primitives:

  - '@id': metrics:windows-server:hostname
    '@type': liongard:MetricPrimitive
    name: Windows Server — Hostname
    description: DNS hostname of the server from NetConfig[0].DNSHostName.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: windows-server-inspector
      inspectorId: 25
    liongardMetricName: 'Windows Server: Host Name'
    liongardMetricId: 79800
    liongardMetricUuid: "eb89ccc4-d29c-47c8-8ab9-2d8cd58b3ba9"
    jmesPath: NetConfig[0].DNSHostName
    resultType: string
    status: VALIDATED
    validatedOn: '2026-05-26'
    validatedSystemReference: Liongard Global metric catalog
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'

  - '@id': metrics:windows-server:os-name
    '@type': liongard:MetricPrimitive
    name: Windows Server — Operating System Name
    description: Full OS name string from OS.OperatingSystemName (e.g. 'Windows Server
      2019 Standard').
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: windows-server-inspector
      inspectorId: 25
    liongardMetricName: 'Windows Server: Operating System'
    liongardMetricId: 2160
    liongardMetricUuid: "c709d4a1-e490-4215-8f23-a233b8e69b7a"
    jmesPath: OS.OperatingSystemName
    resultType: string
    status: VALIDATED
    validatedOn: '2026-05-26'
    validatedSystemReference: Liongard Global metric catalog
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'

  - '@id': metrics:windows-server:days-since-last-reboot
    '@type': liongard:MetricPrimitive
    name: Windows Server — Days Since Last Reboot
    description: Number of days since the server was last rebooted from SystemInfo.DaysSinceLastReboot.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: windows-server-inspector
      inspectorId: 25
    liongardMetricName: 'Windows Server: Days Since Last Reboot Count'
    liongardMetricId: 1239
    liongardMetricUuid: "1943f878-9c8f-4800-964d-73521793f813"
    jmesPath: SystemInfo.DaysSinceLastReboot
    resultType: integer
    resultUnit: days
    compliantWhen: result <= slas.max_days_since_reboot (default 30)
    compliesWith:
    - cyber-insurance-domain-endpoint
    status: VALIDATED
    validatedOn: '2026-05-26'
    validatedSystemReference: Liongard Global metric catalog
    sourceRecipe: recipes/single-system-analysis/by-inspector/windows-server.md
    dateAdded: '2026-05-26'

  - '@id': metrics:windows-server:installed-roles-list
