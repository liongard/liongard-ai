"$schema": "../../schemas/primitive.schema.json"

primitives:

  - "@id": "metrics:box:system-info"
    "@type": "liongard:MetricPrimitive"
    name: "Box — System Info"
    description: "Top-level system information object for the Box enterprise tenant."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "box-com-inspector"
      inspectorId: 14
    liongardMetricName: "Box: SystemInfo"
    liongardMetricId: 438
    liongardMetricUuid: "5611c39c-1d87-4907-a6df-1b8dc0953c73"
    jmesPath: "SystemInfo"
    resultType: "object"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/box.md"
    dateAdded: "2026-05-26"

