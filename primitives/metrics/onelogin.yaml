  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: onelogin-inspector
    inspectorId: 27
  jmesPath: length(Apps)
  resultType: integer
  fieldGotcha: 'Apps[] confirmed fields: id, name, description, connector_id, auth_method
    (integer), auth_method_description (string), created_at, updated_at, AssignedUsers[],
    Rules[], Conditions[], Actions[], roles_r[], daysSinceAppCreated_r, daysSinceLastUpdated_r.
    NOTE: No security policy or MFA-required flag on Apps — unprotected-app count
    is a DATA GAP.'
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: Active system (inspected 2026-05-28)
  sourceRecipe: recipes/single-system-analysis/by-inspector/onelogin.md
  dateAdded: '2026-05-26'

