"$schema": "../../schemas/primitive.schema.json"

# OneLogin (Inspector ID 27)
# Eval sweep 2026-05-28 findings:
# Single-tenant inspector. Validated on active system (inspected 2026-05-28, today).
# Dataprint root keys: Users, Groups, Roles, UserMappings, AuthServers, Rules, Apps, Name.
# GOTCHA: 4 prior PROPOSED paths used fabricated 'onelogin.*' namespace — ALL returned null.
#   Real: 'onelogin.users.mfaEnrolledCount' → length(Users[?length(EnrolledAuthenticationFactors) > `0`])
#   Real: 'onelogin.applications.totalCount' → length(Apps)
# DATA GAPS confirmed: Admin privilege level not on Users[] — no admin-count path possible.
# DATA GAPS confirmed: No security policy/MFA-required field on Apps — unprotected-count not possible.
# Users[].EnrolledAuthenticationFactors is an ARRAY (empty = not enrolled; use length() filter).
# Users[].status integer values: 0=unactivated, 1=active, 2=suspended, 3=locked, 4=password_expired.
# 2 PROPOSED paths upgraded with real paths; 2 data-gap primitives removed. Net: 18 → 16 primitives.

primitives:

- '@id': metrics:onelogin:user-summary
  '@type': liongard:MetricPrimitive
  name: OneLogin — User Summary
  description: List of users with email and assigned roles.
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: onelogin-inspector
    inspectorId: 27
  liongardMetricName: 'OneLogin: User Summary'
  liongardMetricId: 1243
  liongardMetricUuid: "83be2884-4f3a-4542-a11f-9a7f3ed40c36"
  jmesPath: 'Users[].[`Email: ` email, `| Roles: `join(`, `assignedRoles_r) || to_array(`-`)]'
  resultType: array
  status: VALIDATED
  validatedOn: '2026-05-26'
  validatedSystemReference: Liongard Global metric catalog
  sourceRecipe: recipes/single-system-analysis/by-inspector/onelogin.md
  dateAdded: '2026-05-26'

