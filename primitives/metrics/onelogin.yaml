- '@id': metrics:onelogin:users-mfa-enrolled-count
  '@type': liongard:MetricPrimitive
  name: OneLogin — MFA Enrolled User Count
  description: Number of users with at least one enrolled MFA factor in the OneLogin
    tenant.
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: onelogin-inspector
    inspectorId: 27
  jmesPath: length(Users[?length(EnrolledAuthenticationFactors) > `0`])
  resultType: integer
  fieldGotcha: 'EnrolledAuthenticationFactors is an ARRAY on each User object — use
    length() filter to count users with >=1 enrolled factor. Prior PROPOSED path ''onelogin.users.mfaEnrolledCount''
    was a fabricated namespace and returned null. NOTE: Admin privilege level is NOT
    surfaced on Users[] in the dataprint — no admin-count primitive is possible via
    JMESPath.'
  compliantWhen: == active user count
  compliesWith:
  - CIS-Controls-v8:6.3
  - CIS-Controls-v8:6.5
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: Active system (inspected 2026-05-28)
  sourceRecipe: recipes/single-system-analysis/by-inspector/onelogin.md
  dateAdded: '2026-05-26'

