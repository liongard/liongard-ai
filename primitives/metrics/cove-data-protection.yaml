# ── 24-Hour Compliance (Device / Agent-Based) ─────────────────────────────────

  - "@id": "metrics:cove-data-protection:count-device-backup-overdue-24h"
    "@type": "liongard:MetricPrimitive"
    name: "Cove Data Protection — 24-Hour Since Last Completed Device Backup Count"
    description: "Count of agent-based (BackupManager) devices that have not completed a backup in more than 24 hours."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cove-data-protection-inspector"
      inspectorId: 76
    liongardMetricName: "Cove Data Protection: 24 Hours Since Last Completed Device Backup Count"
    liongardMetricId: 1196
    liongardMetricUuid: "d12122d1-71ed-43e6-9b03-07600a4d4fe1"
    jmesPath: "Devices[?Type == `BackupManager` && HoursSinceLastCompletedSession_r >`24`] | length(@)"
    resultType: "integer"
    resultUnit: "count"
    compliantWhen: "result == 0"
    compliesWith:
      - "CIS-Controls-v8:11.1"
      - "cyber-insurance-domain-backup"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    fieldGotcha: "HoursSinceLastCompletedSession_r is a resolved/computed string field — filter uses string comparison '>`24`'. BackupManager type covers agent-based Windows/Linux/Mac devices; does not include Office365 devices."
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cove-data-protection.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:cove-data-protection:list-device-backup-overdue-24h"
