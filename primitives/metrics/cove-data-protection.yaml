    liongardMetricId: 1191
    liongardMetricUuid: "39fcd8e1-dc9b-4117-b009-b82687065eee"
    jmesPath: "Devices[?BackupStatus==`Failed`].Name"
    resultType: "array"
    compliantWhen: "result == []"
    compliesWith:
