# ── Failed & Overdue Backups ──────────────────────────────────────────────────

  - "@id": "metrics:cove-data-protection:count-failed-backups"
    "@type": "liongard:MetricPrimitive"
    name: "Cove Data Protection — Count of Failed Backups"
    description: "Count of devices where BackupStatus is 'Failed'. Should be 0. This is the primary headline metric for Cove backup health."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cove-data-protection-inspector"
      inspectorId: 76
    liongardMetricName: "Cove Data Protection: Count of Failed Backups"
    liongardMetricId: 1190
    liongardMetricUuid: "c93f17d7-2ae5-407b-8adf-37083dc5cdd3"
    jmesPath: "Devices[?BackupStatus==`Failed`] | length(@)"
    resultType: "integer"
    resultUnit: "count"
    compliantWhen: "result == 0"
    compliesWith:
      - "CIS-Controls-v8:11.1"
      - "cyber-insurance-domain-backup"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cove-data-protection.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:cove-data-protection:list-failed-backups"
    "@type": "liongard:MetricPrimitive"
    name: "Cove Data Protection — List of Failed Backups"
