    resultType: "integer"
    resultUnit: "count"
    status: "VALIDATED"
    validatedOn: "2026-05-07"
    validatedSystemReference: "System A — 1 (Administrator)"
    compliesWith:
      - "CIS-Controls-v8:5.1"
      - "cyber-insurance-domain-auth"
    answersQuestion:
