    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "active-directory-inspector"
      inspectorId: 13
    liongardMetricName: "Active Directory: Privileged Users List"
    liongardMetricId: 76
    liongardMetricUuid: "3353c2ad-1bd5-45c3-91a6-61b645244d3b"
    jmesPath: "SystemInfo.PrivilegedUsersStr"
    resultType: "string"
    status: "VALIDATED"
    validatedOn: "2026-05-07"
    validatedSystemReference: "System A — 'Administrator'"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/active-directory.md"
    dateAdded: "2026-05-26"

  # ── User Activity & Status ───────────────────────────────────────────────────

  - "@id": "metrics:active-directory:stale-users-count"
    "@type": "liongard:MetricPrimitive"
    name: "Active Directory — Stale Active User Accounts Count"
    description: >
      Count of non-default, enabled users whose activity is Stale.
      Excludes default system accounts (DefaultSystemUser = false).
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "active-directory-inspector"
      inspectorId: 13
    liongardMetricName: "Active Directory: Stale User Accounts Count"
    liongardMetricId: 773
    liongardMetricUuid: "06e99537-6d00-4470-aedc-3d36b30e29de"
    jmesPath: "Users[?UserActivity==`Stale` && DefaultSystemUser==`false` && Enabled == `true`] | length(@)"
    resultType: "integer"
    resultUnit: "count"
    status: "VALIDATED"
    validatedOn: "2026-05-07"
    validatedSystemReference: "System A — 0 (no stale non-default users)"
    compliesWith:
      - "CIS-Controls-v8:5.3"
      - "cyber-insurance-domain-auth"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/active-directory.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:active-directory:never-used-users-count"
    "@type": "liongard:MetricPrimitive"
    name: "Active Directory — Never-Used Active User Accounts Count"
    description: >
      Count of non-default, enabled users who have never logged in
      (LastLogonDate is null). Indicates provisioned-but-unused accounts.
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "active-directory-inspector"
      inspectorId: 13
    liongardMetricName: "Active Directory: Never Used User Accounts Count"
    liongardMetricId: 775
    liongardMetricUuid: "833aba1d-da72-4921-86bb-c705338edff5"
    jmesPath: "Users[?LastLogonDate == `null` && DefaultSystemUser == `false` && Enabled == `true`] | length(@)"
    resultType: "integer"
    resultUnit: "count"
    status: "VALIDATED"
    validatedOn: "2026-05-07"
    validatedSystemReference: "System A — 0"
    compliesWith:
      - "CIS-Controls-v8:5.3"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/active-directory.md"
    dateAdded: "2026-05-26"

  # ── Default Accounts ─────────────────────────────────────────────────────────

  - "@id": "metrics:active-directory:guest-account-enabled"
    "@type": "liongard:MetricPrimitive"
    name: "Active Directory — Default Guest Account Enabled"
    description: "Whether the built-in Guest account is enabled. Should be false."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "active-directory-inspector"
      inspectorId: 13
    liongardMetricName: "Active Directory: Default Guest Account Enabled"
    liongardMetricId: 780
    liongardMetricUuid: "4fa30dbd-6b99-46c9-802b-14f8b49864cb"
    jmesPath: "DefaultGuestAccountEnabled"
    resultType: "boolean"
    status: "VALIDATED"
    validatedOn: "2026-05-07"
    validatedSystemReference: "System A — false"
    compliesWith:
      - "CIS-Controls-v8:4.7"
      - "cyber-insurance-domain-auth"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/active-directory.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:active-directory:guest-members-count"
    "@type": "liongard:MetricPrimitive"
    name: "Active Directory — Guest Members Count"
    description: >
      Count of members in the GuestMembers array. Used alongside
      guest-account-enabled to confirm no accounts are operating as guests.
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "active-directory-inspector"
      inspectorId: 13
    liongardMetricName: "Active Directory: Default Guest Account Enabled Count"
    liongardMetricId: 781
    liongardMetricUuid: "e5856aa1-7b4d-412b-b3ab-06056896d1c7"
    jmesPath: "GuestMembers | length(@)"
    resultType: "integer"
    resultUnit: "count"
    status: "VALIDATED"
    validatedOn: "2026-05-07"
    validatedSystemReference: "System A — 1 (Guest account present)"
    fieldGotcha: >
      Recipe uses length(GuestMembers) — equivalent to GuestMembers | length(@).
      Global metric id=781 uses the pipe form; both evaluate identically.
    sourceRecipe: "recipes/single-system-analysis/by-inspector/active-directory.md"
    dateAdded: "2026-05-26"

  # ── DHCP ─────────────────────────────────────────────────────────────────────

  - "@id": "metrics:active-directory:dhcp-scopes"
    "@type": "liongard:MetricPrimitive"
    name: "Active Directory — DHCP Server Scopes"
    description: >
      Array of DHCPv4 scopes when AD is also acting as a DHCP server.
      Only populated when the DC hosts the DHCP role — null otherwise.
      Related Global metric (id=1758) returns only scopes ≥80% utilisation.
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "active-directory-inspector"
      inspectorId: 13
    jmesPath: "DHCP.Serverv4Scopes"
    resultType: "array"
    status: "SCHEMA_CONFIRMED"
    validatedOn: "2026-05-07"
    validatedSystemReference: "Systems A, B, and two others — null (DHCP not on DC in lab)"
    fieldGotcha: >
      Returns null when DC does not host the DHCP role. Check for null before
      attempting array operations. DHCP.Serverv4Scopes[0] confirmed null on
      4 test systems — field exists in schema but requires DHCP role on DC.
    sourceRecipe: "recipes/single-system-analysis/by-inspector/active-directory.md"
    dateAdded: "2026-05-26"
