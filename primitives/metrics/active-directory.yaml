"$schema": "../../schemas/primitive.schema.json"

primitives:

  # ── Password Policy ─────────────────────────────────────────────────────────

  - "@id": "metrics:active-directory:min-password-length"
    "@type": "liongard:MetricPrimitive"
    name: "Active Directory — Account Minimum Password Length"
    description: "Minimum number of characters required for domain user passwords."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "active-directory-inspector"
      inspectorId: 13
    liongardMetricName: "Active Directory: Account Minimum Password Length"
    liongardMetricId: 792
    liongardMetricUuid: "7e3d321c-7c72-4f1d-9262-03572d65ee40"
    jmesPath: "AccountPolicy.MinPasswordLength"
    resultType: "integer"
    resultUnit: "characters"
    status: "VALIDATED"
    validatedOn: "2026-05-07"
    validatedSystemReference: "System A — Windows Server 2025 DC"
    compliesWith:
      - "CIS-Controls-v8:5.2"
      - "cyber-insurance-domain-auth"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/active-directory.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:active-directory:password-complexity-enabled"
    "@type": "liongard:MetricPrimitive"
    name: "Active Directory — Password Complexity Enabled"
    description: "Whether domain password complexity requirements are enforced (boolean)."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "active-directory-inspector"
      inspectorId: 13
    liongardMetricName: "Active Directory: Account Password Complexity"
    liongardMetricId: 793
    liongardMetricUuid: "ded38e56-cb10-404a-944b-65cb73dd3299"
    jmesPath: "AccountPolicy.PasswordComplexity"
    resultType: "boolean"
    status: "VALIDATED"
    validatedOn: "2026-05-07"
    validatedSystemReference: "System A — Windows Server 2025 DC"
    compliesWith:
      - "CIS-Controls-v8:5.2"
      - "cyber-insurance-domain-auth"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/active-directory.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:active-directory:max-password-age-days"
    "@type": "liongard:MetricPrimitive"
    name: "Active Directory — Maximum Password Age"
    description: "Maximum number of days before a domain user password must be changed."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "active-directory-inspector"
      inspectorId: 13
    liongardMetricName: "Active Directory: Maximum Password Age"
    liongardMetricId: 748
    liongardMetricUuid: "02a64ef0-090e-48a9-b582-1aba3d423e5b"
    jmesPath: "AccountPolicy.MaxPasswordAge"
    resultType: "integer"
    resultUnit: "days"
    status: "VALIDATED"
    validatedOn: "2026-05-07"
    validatedSystemReference: "System A — Windows Server 2025 DC"
    compliesWith:
      - "CIS-Controls-v8:5.2"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/active-directory.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:active-directory:password-history-length"
    "@type": "liongard:MetricPrimitive"
    name: "Active Directory — Password History Length"
    description: "Number of unique previous passwords remembered to prevent reuse."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "active-directory-inspector"
      inspectorId: 13
    liongardMetricName: "Active Directory: Password History Length"
    liongardMetricId: 2022
    liongardMetricUuid: "01e71458-4e0b-4aeb-9267-431e4758eda4"
    jmesPath: "AccountPolicy.pwdHistoryLength"
    resultType: "integer"
    resultUnit: "count"
    status: "VALIDATED"
    validatedOn: "2026-05-07"
    validatedSystemReference: "System A — Windows Server 2025 DC"
    compliesWith:
      - "CIS-Controls-v8:5.2"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/active-directory.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:active-directory:password-reversible-encryption"
    "@type": "liongard:MetricPrimitive"
    name: "Active Directory — Store Passwords With Reversible Encryption"
    description: >
      Whether domain accounts store passwords using reversible encryption.
      Should always be false — true means passwords can be decrypted in plaintext.
      No matching Global metric; custom primitive.
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "active-directory-inspector"
      inspectorId: 13
    jmesPath: "AccountPolicy.PasswordReversible"
    resultType: "boolean"
    status: "VALIDATED"
    validatedOn: "2026-05-07"
    validatedSystemReference: "System A — Windows Server 2025 DC"
    compliesWith:
      - "CIS-Controls-v8:5.2"
      - "cyber-insurance-domain-auth"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/active-directory.md"
    dateAdded: "2026-05-26"

  # ── Account Lockout Policy ───────────────────────────────────────────────────

  - "@id": "metrics:active-directory:lockout-threshold"
    "@type": "liongard:MetricPrimitive"
    name: "Active Directory — Account Lockout Threshold"
    description: >
      Number of failed logon attempts before an account is locked out.
      0 means lockout is disabled — never interpret 0 as "zero attempts".
      Pair with lockout-duration-hours and lockout-observation-window-hours.
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "active-directory-inspector"
      inspectorId: 13
    liongardMetricName: "Active Directory: Account Lockout Threshold"
    liongardMetricId: 794
    liongardMetricUuid: "c013da01-bcd1-46b1-9eb4-13012ede188c"
    jmesPath: "AccountPolicy.lockoutThreshold"
    resultType: "integer"
    resultUnit: "attempts"
    status: "VALIDATED"
    validatedOn: "2026-05-07"
    validatedSystemReference: "System A — Windows Server 2025 DC"
    fieldGotcha: "0 = no lockout enforced. Validated: System A returned 0 (lockout disabled)."
    compliesWith:
      - "CIS-Controls-v8:6.2"
      - "cyber-insurance-domain-auth"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/active-directory.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:active-directory:lockout-duration-hours"
    "@type": "liongard:MetricPrimitive"
    name: "Active Directory — Account Lockout Duration"
    description: >
      How long (in hours) an account remains locked after exceeding the lockout
      threshold. Stored as a float — 0.25 = 15 minutes, 0.5 = 30 minutes.
      Unit is hours, NOT minutes.
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "active-directory-inspector"
      inspectorId: 13
    liongardMetricName: "Active Directory: Account Lockout Duration"
    liongardMetricId: 796
    liongardMetricUuid: "ff9913f8-df23-4f06-935f-c1c79e52be55"
    jmesPath: "AccountPolicy.AccountLockoutDuration"
    resultType: "integer"
    resultUnit: "hours"
    status: "VALIDATED"
    validatedOn: "2026-05-07"
    validatedSystemReference: "System A (0.1666… = 10 min), System B (0.5 = 30 min)"
    fieldGotcha: "Unit is hours as a float. 0.25 = 15 min, 0.5 = 30 min. Do NOT interpret as minutes."
    compliesWith:
      - "CIS-Controls-v8:6.2"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/active-directory.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:active-directory:lockout-observation-window-hours"
    "@type": "liongard:MetricPrimitive"
    name: "Active Directory — Account Lockout Observation Window"
    description: >
      Time window (in hours) during which failed logon attempts count toward the
      lockout threshold. Float — same unit and precision as lockout-duration-hours.
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "active-directory-inspector"
      inspectorId: 13
    liongardMetricName: "Active Directory: Account Lockout Observation Window"
    liongardMetricId: 795
    liongardMetricUuid: "664f1bfd-e5b2-4ec1-a68c-e69e4bd42199"
    jmesPath: "AccountPolicy.AccountLockoutObservationWindow"
    resultType: "integer"
    resultUnit: "hours"
    status: "VALIDATED"
    validatedOn: "2026-05-07"
    validatedSystemReference: "System A — 0.1666… (10 min)"
    fieldGotcha: "Unit is hours as a float, same as AccountLockoutDuration."
    sourceRecipe: "recipes/single-system-analysis/by-inspector/active-directory.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:active-directory:lockout-threshold-string"
    "@type": "liongard:MetricPrimitive"
    name: "Active Directory — Lockout Threshold Description"
    description: >
      Human-readable string describing the lockout threshold
      (e.g. "Infinite Bad Logins Allowed" when threshold = 0).
      Different field from lockout-threshold (numeric). No matching Global metric;
      custom primitive used for display in reports.
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "active-directory-inspector"
      inspectorId: 13
    jmesPath: "AccountPolicy.AccountLockoutThreshold"
    resultType: "string"
    status: "VALIDATED"
    validatedOn: "2026-05-07"
    validatedSystemReference: "System A — 'Infinite Bad Logins Allowed'"
    fieldGotcha: >
      Distinct from AccountPolicy.lockoutThreshold (integer). This is a display string.
      When lockoutThreshold = 0 this returns 'Infinite Bad Logins Allowed'.
    sourceRecipe: "recipes/single-system-analysis/by-inspector/active-directory.md"
    dateAdded: "2026-05-26"

  # ── Privileged Users ─────────────────────────────────────────────────────────

