"$schema": "../../schemas/primitive.schema.json"

primitives:

  - '@id': metrics:duo-security:active-user-count
    '@type': liongard:MetricPrimitive
    name: Duo Security — Active User Count
    description: 'Count of Duo users with status == active. JMESPath: Users[?status
      == `active`] | length(@). status is a string — use single quotes, not backtick-quoted
      literals.'
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: duo-security-inspector
      inspectorId: 47
    liongardMetricName: 'Duo: Active User Count'
    liongardMetricId: 214
    liongardMetricUuid: "bddd8450-a2f4-4a61-aa9c-6d1c20ab563a"
    jmesPath: Users[?status == 'active'] | length(@)
    resultType: integer
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System A (child) — Completed 2026-05-18
    sourceRecipe: recipes/single-system-analysis/by-inspector/duo-security.md
    dateAdded: '2026-05-26'

  - '@id': metrics:duo-security:active-user-list
    '@type': liongard:MetricPrimitive
    name: Duo Security — Active User List
    description: 'Comma-separated real names of Duo users with status == active. JMESPath:
      Users[?status == `active`].realname | join(`, `, @). status is a string — use
      single quotes.'
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: duo-security-inspector
      inspectorId: 47
    liongardMetricName: 'Duo: Active User List'
    liongardMetricId: 215
    liongardMetricUuid: "7133a265-617e-4cc2-b836-443561b9d6a1"
    jmesPath: Users[?status == 'active'].realname
    resultType: string
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System A (child) — Completed 2026-05-18
    sourceRecipe: recipes/single-system-analysis/by-inspector/duo-security.md
    dateAdded: '2026-05-26'

  - '@id': metrics:duo-security:users-not-enrolled-mfa-count
    '@type': liongard:MetricPrimitive
    name: Duo Security — Users Not Enrolled in MFA Count
    description: 'Count of Duo users who are not enrolled in MFA (is_enrolled == false).
      JMESPath: length(Users[?is_enrolled == `false`])'
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: duo-security-inspector
      inspectorId: 47
    liongardMetricName: 'Duo Security: Users Not Enrolled in MFA Count'
    jmesPath: length(Users[?is_enrolled == `false`])
    resultType: integer
    compliantWhen: result == 0
    compliesWith:
    - CIS-Controls-v8:6.3
    - CIS-Controls-v8:6.5
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System A (child) — Completed 2026-05-18
    sourceRecipe: recipes/single-system-analysis/by-inspector/duo-security.md
    dateAdded: '2026-05-26'

  - '@id': metrics:duo-security:users-not-enrolled-mfa-list
    '@type': liongard:MetricPrimitive
    name: Duo Security — Users Not Enrolled in MFA List
    description: List of users not enrolled in MFA with username, realname, status,
      and creation date.
    evaluates:
      '@type': liongard:Inspector
      inspectorSlug: duo-security-inspector
      inspectorId: 47
    liongardMetricName: 'Duo Security: Users Not Enrolled in MFA List'
    jmesPath: 'Users[?is_enrolled == `false`].{username: username, realname: realname,
      status: status, created: created}'
    resultType: array
    compliantWhen: result == null || length(result) == 0
    compliesWith:
    - CIS-Controls-v8:6.3
    - CIS-Controls-v8:6.5
    status: VALIDATED
    validatedOn: '2026-05-28'
    validatedSystemReference: System A (child) — Completed 2026-05-18
    sourceRecipe: recipes/single-system-analysis/by-inspector/duo-security.md
    dateAdded: '2026-05-26'

  - '@id': metrics:duo-security:active-bypass-lockedout-user-count
    '@type': liongard:MetricPrimitive
    name: Duo Security — Active, Bypass, and Locked Out User Count
