"$schema": "../../schemas/primitive.schema.json"

primitives:

# ── Device Identity ───────────────────────────────────────────────────────────

  - "@id": "metrics:fortinet-fortigate:hostname"
    "@type": "liongard:MetricPrimitive"
    name: "Fortinet FortiGate — Hostname"
    description: "Hostname of the FortiGate appliance from SystemGlobal.hostname."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "fortinet-fortigate-inspector"
      inspectorId: 33
    liongardMetricName: "Fortinet FortiGate: Hostname"
    liongardMetricId: 626
    liongardMetricUuid: "5565b215-7118-4447-a9b5-f9610413a2f4"
    jmesPath: "SystemGlobal.hostname"
    resultType: "string"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/fortinet-fortigate.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:fortinet-fortigate:model"
    "@type": "liongard:MetricPrimitive"
    name: "Fortinet FortiGate — Model Number"
    description: "Hardware platform ID (model) from Firmware.current.\"platform-id\"."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "fortinet-fortigate-inspector"
      inspectorId: 33
    liongardMetricName: "Fortinet FortiGate: Model Number"
    liongardMetricId: 223
    liongardMetricUuid: "8fe5641e-6c32-4ce9-8b11-bcc09001f5e8"
    jmesPath: "Firmware.current.\"platform-id\""
    resultType: "string"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    fieldGotcha: "Two paths exist for model/version info. id=223 uses Firmware.current.\"platform-id\" (the Fortinet API path). id=521 uses SystemInfo.Firmware.Version for the firmware string. These are complementary — use 223 for model, 224/521 for firmware version."
    sourceRecipe: "recipes/single-system-analysis/by-inspector/fortinet-fortigate.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:fortinet-fortigate:firmware-version"
    "@type": "liongard:MetricPrimitive"
    name: "Fortinet FortiGate — Firmware Version"
    description: "Current firmware version string from Firmware.current.\"version\"."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "fortinet-fortigate-inspector"
      inspectorId: 33
    liongardMetricName: "Fortinet FortiGate: Firmware Version"
    liongardMetricId: 224
    liongardMetricUuid: "e6ed971a-3d67-4b27-86ac-fe0316b4dbee"
    jmesPath: "Firmware.current.\"version\""
    resultType: "string"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    fieldGotcha: "Quoted key required in JMESPath because 'version' is a reserved word in some JMESPath implementations. Use Firmware.current.\"version\" not Firmware.current.version. The id=521 metric provides an alternate path SystemInfo.Firmware.Version which may differ on some firmware versions."
    sourceRecipe: "recipes/single-system-analysis/by-inspector/fortinet-fortigate.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:fortinet-fortigate:dns-servers"
    "@type": "liongard:MetricPrimitive"
    name: "Fortinet FortiGate — DNS Servers"
    description: "Comma-joined primary and secondary DNS server addresses from DNS.[\"primary\",\"secondary\"]."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "fortinet-fortigate-inspector"
      inspectorId: 33
    liongardMetricName: "Fortinet FortiGate: DNS Servers"
    liongardMetricId: 222
    liongardMetricUuid: "5c01ef92-3ad6-4882-9cfb-9a30d967c67e"
    jmesPath: "DNS.[\"primary\",\"secondary\"] | join(`, `, @)"
    resultType: "string"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/fortinet-fortigate.md"
    dateAdded: "2026-05-26"

# ── Users & Access ────────────────────────────────────────────────────────────

  - "@id": "metrics:fortinet-fortigate:user-summary"
    "@type": "liongard:MetricPrimitive"
    name: "Fortinet FortiGate — User Summary"
    description: "Sorted array of user detail strings (name, vdom, type, access profile) from Users[]."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "fortinet-fortigate-inspector"
      inspectorId: 33
    liongardMetricName: "Fortinet FortiGate: User Summary"
    liongardMetricId: 627
    liongardMetricUuid: "8755d8a6-4e9a-4c7a-9ec0-86902fb8c0e2"
    jmesPath: "Users[].join( `, `, [join(`: `, [`Name`, to_string(name)]), join(`: `, [`Vdom Name`,to_string(sort(vdom[].name))]), join(`: `, [`Type`,to_string(type_r)]), join(`: `, [`Profile`,to_string(accprofile)])]) | sort(@)"
    resultType: "array"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    fieldGotcha: "Users[] contains local VPN/firewall auth accounts only — NOT admin accounts. FortiGate admin accounts (System > Administrators) are NOT present in the dataprint. AdminUsers key returns null on all validated systems. Admin account audit requires manual FortiGate GUI review."
    sourceRecipe: "recipes/single-system-analysis/by-inspector/fortinet-fortigate.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:fortinet-fortigate:group-summary"
    "@type": "liongard:MetricPrimitive"
    name: "Fortinet FortiGate — Group Summary"
    description: "Sorted array of group detail strings (name, email, members, group type) from Groups[]."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "fortinet-fortigate-inspector"
      inspectorId: 33
    liongardMetricName: "Fortinet FortiGate: Group Summary"
    liongardMetricId: 628
    liongardMetricUuid: "51b85ff4-30ed-4233-908b-1c230191f1e3"
    jmesPath: "Groups[].join( `, `, [join(`: `, [`Name`,to_string(name)]), join(`: `, [`Email`,to_string(email)]), join(`: `, [`Member`,to_string(sort(member[].name))]), join(`: `, [`Group Type`,to_string(\"group-type\")])]) | sort(@)"
    resultType: "array"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/fortinet-fortigate.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:fortinet-fortigate:access-profiles-summary"
    "@type": "liongard:MetricPrimitive"
    name: "Fortinet FortiGate — Access Profiles Summary"
    description: "Admin access profile permissions summary from UserProfiles[]. Identifies which profiles have system, network, and security configuration access."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "fortinet-fortigate-inspector"
      inspectorId: 33
    liongardMetricName: "Fortinet FortiGate: Access Profiles Summary"
    liongardMetricId: 630
    liongardMetricUuid: "d162fb94-c3f5-4088-b994-6c156c6042fa"
    jmesPath: "UserProfiles[].join( `, `, [join(`: `, [`Name`, to_string(name)]), join(`: `, [`Scope`,to_string(scope)]) , join(`: `, [`Network Config`,to_string(netgrp)]) , join(`: `, [`System Config`,to_string(sysgrp)]) , join(`: `, [`Security Profiles`,to_string(utmgrp)]), join(`: `, [`IPsec,SSL,PPTP,L2TP VPN`,to_string(vpngrp)])])"
    resultType: "array"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/fortinet-fortigate.md"
    dateAdded: "2026-05-26"

