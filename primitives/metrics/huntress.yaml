"$schema": "../../schemas/primitive.schema.json"

# Huntress (Inspector ID 97)
# Eval sweep 2026-05-28 findings:
# PARENT/CHILD inspector — target child for EVALUATE.
# Validated on child system (Timeout — data valid from 2025-12-02).
# Child dataprint root keys: Agents, Organization, Name.
# DATA GAP: Incidents[] does NOT exist in the child dataprint.
# DATA GAP: Footholds[] does NOT exist in the child dataprint.
#   Alternative: Organization.incident_reports_count (integer) = pre-aggregated incident report count.
# GOTCHA: Agents[].DaysSinceLastCheckin is an INTEGER (Liongard-computed).
# GOTCHA: Organization is a single OBJECT (not array) with pre-aggregated counts.
# 3 PROPOSED: agents-total-count → VALIDATED; active-incidents-count → VALIDATED (path changed);
#   footholds-count → REMOVED (data gap). Net: 9 → 8 primitives.

primitives:

- '@id': metrics:huntress:agents-total-count
  '@type': liongard:MetricPrimitive
  name: Huntress — Total Agents Count
  description: Total count of Huntress agents enrolled from length(Agents).
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: huntress-inspector
    inspectorId: 97
  jmesPath: length(Agents)
  resultType: integer
  resultUnit: count
  fieldGotcha: 'Agents[] confirmed fields: id, version, arch, win_build_number, domain_name,
    created_at, hostname, ipv4_address, external_ip, mac_addresses, updated_at, last_survey_at,
    last_callback_at, account_id, organization_id, platform, os, os_major, os_minor,
    os_patch, os_build_version, os_version, service_pack, service_pack_major, service_pack_minor,
    edr_version, version_number, serial_number, tags, DaysSinceLastCheckin (integer).
    NOTE: Incidents[] and Footholds[] do NOT exist in the child dataprint.'
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: Active system (Timeout — data valid, inspected 2025-12-02)
  sourceRecipe: recipes/single-system-analysis/by-inspector/huntress.md
  dateAdded: '2026-05-26'

- '@id': metrics:huntress:unresponsive-agents-count-30d
  '@type': liongard:MetricPrimitive
  name: Huntress — Unresponsive Agents Count (30 days)
  description: Count of agents that have not checked in for 30+ days from Agents[?DaysSinceLastCheckin
    >= 30]. Should be 0 for healthy managed endpoints.
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: huntress-inspector
    inspectorId: 97
  liongardMetricName: 'Huntress: Unresponsive agents count (30 days)'
  liongardMetricId: 24303
  liongardMetricUuid: "0a7a2220-e538-4130-8901-dfbe1183cf3f"
  jmesPath: Agents[?DaysSinceLastCheckin >= `30`] | length(@)
  resultType: integer
  resultUnit: count
  compliantWhen: result == 0
  compliesWith:
  - CIS-Controls-v8:13.7
  - cyber-insurance-domain-endpoint
  status: VALIDATED
  validatedOn: '2026-05-26'
  validatedSystemReference: Liongard Global metric catalog
  sourceRecipe: recipes/single-system-analysis/by-inspector/huntress.md
  dateAdded: '2026-05-26'

