- '@id': metrics:huntress:active-incidents-count
  '@type': liongard:MetricPrimitive
  name: Huntress — Incident Reports Count
  description: 'Pre-aggregated count of incident reports from Organization.incident_reports_count.
    Note: Incidents[] array does not exist in the child dataprint — this is the closest
    available alternative.'
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: huntress-inspector
    inspectorId: 97
  jmesPath: Organization.incident_reports_count
  resultType: integer
  resultUnit: count
  fieldGotcha: 'Incidents[] and Footholds[] arrays DO NOT exist in the Huntress child
    dataprint. The only available incident indicator is Organization.incident_reports_count
    (integer, pre-aggregated). Organization confirmed fields: id, name, created_at,
    updated_at, account_id, key, notify_emails, microsoft_365_tenant_id, incident_reports_count
    (integer), agents_count (integer), microsoft_365_users_count (integer).'
  compliantWhen: result == 0
  compliesWith:
  - cyber-insurance-domain-endpoint
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: Active system (Timeout — data valid, inspected 2025-12-02)
