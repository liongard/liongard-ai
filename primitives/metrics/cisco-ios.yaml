"$schema": "../../schemas/primitive.schema.json"

# NOTE: The cisco-ios.md recipe uses proposed metric paths (cisco-ios.system.*, cisco-ios.interfaces.*, etc.)
# that do not yet exist in the Liongard Global metric catalog as of 2026-05-26.
# Only three metrics for this inspector are confirmed in the catalog.
# All other recipe fields are PROPOSED and omitted here until catalog IDs are assigned.

primitives:

  - "@id": "metrics:cisco-ios:model"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco IOS — Model"
    description: "Hardware platform / model family of the Cisco IOS / IOS-XE device (e.g., 'C2960X'). From SystemInfo.Platform."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-ios-inspector"
      inspectorId: 30
    liongardMetricName: "Cisco IOS: Model"
    liongardMetricId: 225
    liongardMetricUuid: "d71acbbe-76f0-422c-abb4-9983a97077a5"
    jmesPath: "SystemInfo.Platform"
    resultType: "string"
    fieldGotcha: "SystemInfo.Model does NOT exist in the Cisco IOS dataprint — returns null. The correct path for device model/platform is SystemInfo.Platform (e.g., 'C2960X'). Prior path was wrong."
    status: "VALIDATED"
    validatedOn: "2026-05-28"
    validatedSystemReference: "System S (inspected 2026-03-13) — 'C2960X'"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-ios.md"
    dateAdded: "2026-05-26"

