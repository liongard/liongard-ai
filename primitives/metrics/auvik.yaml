"$schema": "../../schemas/primitive.schema.json"

# Auvik inspector ID 62. Parent/Child pattern (parent holds Tenants[]; child holds device/network data).
# Eval sweep 2026-05-28 findings:
# Validated against active child system (Timeout status — last successful inspection data valid).
# GOTCHA: ALL Auvik data is wrapped in Auvik API envelope: {id, type, links, attributes, relationships}.
#   Field data is inside the 'attributes' sub-object — use Devices[].attributes.fieldName.
# GOTCHA: Devices[].attributes.deviceType = string (e.g. 'unknown', 'virtualAppliance', 'switch').
# GOTCHA: Devices[].attributes.onlineStatus = LOWERCASE string ('online', 'offline') — NOT 'Online'.
# GOTCHA: Networks[].attributes.scanStatus = string (e.g. 'notAllowed', 'allowed').
# GOTCHA: length(Tenants) — parent-only path; not available on child systems. Remains PROPOSED.
# Validated: Devices(165), Alerts(81), Configurations(9), EntityAudits(1); Networks-notAllowed(38 of 72).

primitives:

