    jmesPath: "DeviceWarranties[?attributes.serviceCoverageStatus == 'Expired']"
    resultType: "array"
    fieldGotcha: "DeviceWarranties[].attributes confirmed fields: deviceName (string), serviceCoverageStatus (string — 'Expired', 'Active', etc.), warrantyCoverageStatus (string), warrantyExpirationDate (string). Data is inside 'attributes' sub-object."
