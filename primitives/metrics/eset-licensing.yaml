"$schema": "../../schemas/primitive.schema.json"

primitives:

  - "@id": "metrics:eset-inspector:count-of-privileged-users"
    "@type": "liongard:MetricPrimitive"
    name: "ESET Licensing — Count of Privileged Users"
    description: "Count of ESET users with Write/admin permission"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "eset-licensing-inspector"
      inspectorId: 69
    liongardMetricName: "ESET Licensing: Count of Privileged Users"
    liongardMetricId: 1047
    liongardMetricUuid: "2ed6163b-11a2-469c-bd2a-cb86d67c1cff"
    jmesPath: "Users[?Permission_r == `Write`] | length(@)"
    resultType: "integer"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/eset-licensing.md"
    dateAdded: "2026-05-26"

