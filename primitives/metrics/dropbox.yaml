"$schema": "../../schemas/primitive.schema.json"

primitives:

  - "@id": "metrics:dropbox:users-total-count"
    "@type": "liongard:MetricPrimitive"
    name: "Dropbox — Total User Count"
    description: "Total number of users in the Dropbox Business tenant."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "dropbox-inspector"
      inspectorId: 34
    jmesPath: "dropbox.users.totalCount"
    resultType: "integer"
    status: "PROPOSED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/dropbox.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:dropbox:users-active-count"
    "@type": "liongard:MetricPrimitive"
