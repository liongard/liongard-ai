      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-asa-inspector"
      inspectorId: 22
    liongardMetricName: "Cisco ASA: Licenses Expiring within 30 Days Count"
    liongardMetricId: 732
    liongardMetricUuid: "ba4abdd3-e964-4d8a-99c9-92aeeccf768f"
    jmesPath: "length(SystemInfo.Licenses[?DaysTillExpiration<=`30` && Active==`true`])"
    resultType: "integer"
    resultUnit: "count"
    compliantWhen: "result == 0"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-asa.md"
