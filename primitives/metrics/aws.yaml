"$schema": "../../schemas/primitive.schema.json"

# NOTE: The aws.md recipe uses proposed metric paths (aws.iam.*, aws.s3.*, etc.)
# that do not yet exist in the Liongard Global metric catalog. The entries below
# cover only the metrics confirmed in the catalog as of 2026-05-26.
# All other fields in the recipe are marked PROPOSED and omitted here until
# catalog IDs are assigned.

primitives:

  - "@id": "metrics:aws:iam-users-count"
    "@type": "liongard:MetricPrimitive"
    name: "AWS — IAM Users Count"
    description: "Total number of IAM users in this AWS account. JMESPath: SystemInfo.NumIAMUsers"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "aws-inspector"
      inspectorId: 1
    liongardMetricName: "Amazon Web Services: IAM Users Count"
    liongardMetricId: 488
    liongardMetricUuid: "dd4a3db5-5a6e-4c81-ae77-5cc79232a3b2"
    jmesPath: "SystemInfo.NumIAMUsers"
    resultType: "integer"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/aws.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:aws:iam-users-mfa-enabled-count"
    "@type": "liongard:MetricPrimitive"
    name: "AWS — IAM Users with MFA Enabled Count"
    description: "Number of IAM users with MFA enabled. JMESPath: SystemInfo.NumIAMUsersMFAEnabled"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "aws-inspector"
      inspectorId: 1
    liongardMetricName: "Amazon Web Services: Num IAM Users MFA Enabled"
    liongardMetricId: 492
    liongardMetricUuid: "125283ec-89c2-47e2-b214-3ec80e46069c"
    jmesPath: "SystemInfo.NumIAMUsersMFAEnabled"
    resultType: "integer"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/aws.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:aws:users-without-mfa-list"
    "@type": "liongard:MetricPrimitive"
    name: "AWS — IAM Users without MFA Enabled List"
    description: "List of IAM usernames that do not have MFA enabled. JMESPath: Users[?MFAEnabled==`false`].UserName"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "aws-inspector"
      inspectorId: 1
    liongardMetricName: "Amazon Web Services: Users without MFA Enabled List"
    liongardMetricId: 682
    liongardMetricUuid: "0c9298e6-159d-4686-a4da-6a8b79736d09"
    jmesPath: "Users[?MFAEnabled==`false`].UserName | join(`, `, @)"
    resultType: "string"
    compliantWhen: "result == null || result == ''"
    compliesWith:
      - "CIS-Controls-v8:6.3"
      - "CIS-Controls-v8:6.5"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/aws.md"
    dateAdded: "2026-05-26"

