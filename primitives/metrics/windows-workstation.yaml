# ── BitLocker / Drive Encryption ──────────────────────────────────────────────

  - "@id": "metrics:windows-workstation:all-drives-encrypted"
    "@type": "liongard:MetricPrimitive"
    name: "Windows Workstation — All Fixed Drives Encrypted"
    description: "True if all Fixed drives have BitlockerStatus == 'Fully Encrypted'."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "windows-workstation-inspector"
      inspectorId: 90
    liongardMetricName: "Windows Workstation: All Drives Encrypted"
    liongardMetricId: 2067
    liongardMetricUuid: "dab93476-f001-4751-a0cc-9329ad7d049e"
    jmesPath: "length(Drives[?Type == 'Fixed' && BitlockerStatus == 'Fully Encrypted']) == length(Drives[?Type == 'Fixed'])"
    resultType: "boolean"
    compliantWhen: "result == true"
    compliesWith:
      - "CIS-Controls-v8:3.6"
