- '@id': metrics:knowbe4-inspector:training-past-due-count
  '@type': liongard:MetricPrimitive
  name: KnowBe4 — Past Due Training Enrollment Count
  description: Number of training enrollments with 'Past Due' status — users who have
    not completed assigned training.
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: knowbe4-inspector
    inspectorId: 81
  liongardMetricName: 'KnowBe4: Past Due Training Enrollments Count'
  liongardMetricId: 1315
  liongardMetricUuid: "b2d29f87-f9ae-4a0c-ae4f-48b0c0b41fce"
  jmesPath: length(TrainingEnrollments[?status == `Past Due`])
  resultType: integer
  resultUnit: count
  compliantWhen: result == 0
  fieldGotcha: 'status values confirmed: ''Past Due'' (2 words, space-separated).
    Other observed statuses: ''Completed'', ''In Progress''. Filter is exact string
    match.'
