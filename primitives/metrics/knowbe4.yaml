- '@id': metrics:knowbe4-inspector:campaigns-active-count
  '@type': liongard:MetricPrimitive
  name: KnowBe4 — Active Campaigns Count
  description: Number of phishing simulation campaigns currently active.
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: knowbe4-inspector
    inspectorId: 81
  jmesPath: length(Campaigns[?status == `Active`])
  resultType: integer
  resultUnit: count
  fieldGotcha: 'Campaigns[].status is Title Case ''Active'' (capital A) — NOT lowercase
    ''active''. Filter: status == `Active`.'
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: System O (inspected 2026-05-14) — 1 active (lowercase
    filter returned 0)
  sourceRecipe: recipes/single-system-analysis/by-inspector/knowbe4.md
  dateAdded: '2026-05-28'

