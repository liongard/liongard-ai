    inspectorSlug: knowbe4-inspector
    inspectorId: 81
  liongardMetricName: 'KnowBe4: Current Risk Score'
  liongardMetricId: 1309
  liongardMetricUuid: "3252533d-6085-4026-a7a8-b307bddd2976"
  jmesPath: AccountInfo.current_risk_score
  resultType: float
  compliantWhen: result < 10 (industry benchmark for well-trained orgs)
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: System O (inspected 2026-05-14) — 30.44
  sourceRecipe: recipes/single-system-analysis/by-inspector/knowbe4.md
