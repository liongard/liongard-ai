primitives:
- '@id': metrics:knowbe4-inspector:users-count
  '@type': liongard:MetricPrimitive
  name: KnowBe4 — User Count
  description: Total number of users in the KnowBe4 account.
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: knowbe4-inspector
    inspectorId: 81
  liongardMetricName: 'KnowBe4: Users Count'
  liongardMetricId: 1761
  liongardMetricUuid: "ffd3a95e-d22f-4080-9487-bbb8f54ab344"
  jmesPath: length(Users)
  resultType: integer
  resultUnit: count
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: System O (inspected 2026-05-14)
  sourceRecipe: recipes/single-system-analysis/by-inspector/knowbe4.md
  dateAdded: '2026-05-28'

