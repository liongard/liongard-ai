    inspectorId: 81
  liongardMetricName: 'KnowBe4: Campaigns Count'
  liongardMetricId: 1306
  liongardMetricUuid: "35dc18a5-6ba4-453b-bc38-b319582b097b"
  jmesPath: length(Campaigns)
  resultType: integer
  resultUnit: count
  status: VALIDATED
  validatedOn: '2026-05-28'
