    jmesPath: "length(Networks[?Type==`wireless`].SSIDs[] | [?enabled==`true`] | [?wpaEncryptionMode!=`WPA2 only`])"
    resultType: "integer"
    resultUnit: "count"
    compliantWhen: "result == 0"
