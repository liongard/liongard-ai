    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-meraki.md"
    dateAdded: "2026-05-26"

# ── Admin Access ──────────────────────────────────────────────────────────────

  - "@id": "metrics:cisco-meraki:privileged-user-count"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco Meraki — Privileged User Count"
    description: "Count of dashboard users with Privileged == 'Yes' from Users[]."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-meraki-inspector"
      inspectorId: 3
    liongardMetricName: "Cisco Meraki: Privileged User Count"
    liongardMetricId: 237
    liongardMetricUuid: "e2ca034c-ec60-4074-bbfb-7d2c54dd2869"
    jmesPath: "Users[?Privileged == `Yes`].name | length(@)"
    resultType: "integer"
    resultUnit: "count"
    compliesWith:
      - "CIS-Controls-v8:5.4"
      - "cyber-insurance-domain-auth"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    fieldGotcha: "Privileged is the string 'Yes' not boolean true. Filter: Privileged == `Yes` (backtick-quoted string in JMESPath)."
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-meraki.md"
    dateAdded: "2026-05-26"

