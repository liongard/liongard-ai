    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-meraki.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:cisco-meraki:weak-encryption-ssid-list"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco Meraki — Weak Encryption SSID List"
    description: "Names of enabled wireless SSIDs not using WPA2-only encryption."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-meraki-inspector"
      inspectorId: 3
    liongardMetricName: "Cisco Meraki: Wireless Network with Weak Encryption List"
    liongardMetricId: 708
    liongardMetricUuid: "7fb49887-01b6-44b6-b818-e6101a4c5637"
    jmesPath: "Networks[?Type==`wireless`].SSIDs[] | [?enabled==`true`] | [?wpaEncryptionMode!=`WPA2 only`][].name || to_array(`-`) | join(`, `, @)"
    resultType: "string"
    compliantWhen: "result == '-'"
    compliesWith:
      - "CIS-Controls-v8:12.1"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/cisco-meraki.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:cisco-meraki:ssid-list"
    "@type": "liongard:MetricPrimitive"
    name: "Cisco Meraki — SSID List"
    description: "Comma-joined list of all SSID names across all networks from Networks[].SSIDs[].name."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "cisco-meraki-inspector"
      inspectorId: 3
    liongardMetricName: "Cisco Meraki: SSID List"
    liongardMetricId: 16
    liongardMetricUuid: "e67522cf-372b-41e5-8948-f502bdeae256"
    jmesPath: "Networks[].SSIDs[].name | join(`, `,@)"
    resultType: "string"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
