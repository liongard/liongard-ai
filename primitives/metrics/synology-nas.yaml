# ── Shared Folders ────────────────────────────────────────────────────────────

- '@id': metrics:synology-nas:shares-unencrypted-count
  '@type': liongard:MetricPrimitive
  name: "Synology NAS — Unencrypted Shares Count"
  description: Count of shared folders with encryption flag set to 0 (unencrypted).
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: synology-nas-inspector
    inspectorId: 64
  jmesPath: "length(Shares[?encryption == `0`])"
  resultType: integer
  resultUnit: count
  compliantWhen: result == 0
  fieldGotcha: "Shares[].encryption is an INTEGER (0 = not encrypted, 1 = encrypted), NOT
    a boolean. Don't compare against `false`."
  compliesWith:
  - CIS-Controls-v8:3.11
  status: VALIDATED
  validatedOn: '2026-05-26'
  validatedSystemReference: "System A — dev environment"
  sourceRecipe: recipes/single-system-analysis/by-inspector/synology-nas.md
  dateAdded: '2026-05-26'

# ── Services ──────────────────────────────────────────────────────────────────

- '@id': metrics:synology-nas:risky-services-enabled
  '@type': liongard:MetricPrimitive
  name: "Synology NAS — Enabled Services (List)"
  description: Names of all services with enable_status == "enabled". Use to identify risky services (Telnet, NFS, AFP) — flag any of these in the result list.
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: synology-nas-inspector
    inspectorId: 64
  jmesPath: "Services[?enable_status == 'enabled'].name"
  resultType: array
  fieldGotcha: "Services[].enable_status is a STRING \"enabled\"/\"disabled\", NOT a boolean.
    Filter with == 'enabled' (single-quoted string comparison). Do NOT use == `true`."
  compliesWith:
  - CIS-Controls-v8:4.8
  status: VALIDATED
  validatedOn: '2026-05-26'
  validatedSystemReference: "System A — dev environment"
  sourceRecipe: recipes/single-system-analysis/by-inspector/synology-nas.md
  dateAdded: '2026-05-26'

