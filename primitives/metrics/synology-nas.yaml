# ── Users ─────────────────────────────────────────────────────────────────────

- '@id': metrics:synology-nas:admin-users-list
  '@type': liongard:MetricPrimitive
  name: "Synology NAS — Admin Users List"
  description: Array of usernames that are members of the administrators group.
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: synology-nas-inspector
    inspectorId: 64
  liongardMetricName: "Synology NAS: Admin Users Count List"
  liongardMetricId: 397
  liongardMetricUuid: "d44df314-d3f6-40b6-8ebd-ef20354fd71e"
  jmesPath: "Users[?GroupMembership[?name == `administrators`]].name"
  resultType: array
  compliantWhen: result contains only expected admin accounts
  compliesWith:
  - CIS-Controls-v8:5.4
  status: VALIDATED
  validatedOn: '2026-05-26'
  validatedSystemReference: "System A — dev environment"
  sourceRecipe: recipes/single-system-analysis/by-inspector/synology-nas.md
  dateAdded: '2026-05-26'

- '@id': metrics:synology-nas:admin-users-count
  '@type': liongard:MetricPrimitive
  name: "Synology NAS — Admin Users Count"
  description: Count of users that are members of the administrators group.
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: synology-nas-inspector
    inspectorId: 64
  liongardMetricName: "Synology NAS: Admin Users Count"
  liongardMetricId: 398
  liongardMetricUuid: "48e8870a-4be9-45bd-b957-fa33e64b355a"
  jmesPath: "Users[?GroupMembership[?name == `administrators`]] | length(@)"
  resultType: integer
  resultUnit: count
  compliesWith:
  - CIS-Controls-v8:5.4
  status: VALIDATED
  validatedOn: '2026-05-26'
  validatedSystemReference: "System A — dev environment"
  sourceRecipe: recipes/single-system-analysis/by-inspector/synology-nas.md
  dateAdded: '2026-05-26'

- '@id': metrics:synology-nas:active-users-count
  '@type': liongard:MetricPrimitive
  name: "Synology NAS — Active Users Count"
  description: Count of users whose account status is "normal" (not expired).
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: synology-nas-inspector
    inspectorId: 64
  liongardMetricName: "Synology NAS: Total Active Users Count"
  liongardMetricId: 399
  liongardMetricUuid: "84b85e91-c810-4d82-8a8c-f0d167bde3fc"
  jmesPath: "Users[?expired == `normal`] | length(@)"
  resultType: integer
  resultUnit: count
  fieldGotcha: "Users[].expired is a STRING — \"normal\" means active, \"now\" means currently
    expired. Filter with == `normal` (backtick literal). Don't compare against true/false."
  status: VALIDATED
  validatedOn: '2026-05-26'
  validatedSystemReference: "System A — dev environment"
  sourceRecipe: recipes/single-system-analysis/by-inspector/synology-nas.md
  dateAdded: '2026-05-26'

# ── Disk Health ───────────────────────────────────────────────────────────────

- '@id': metrics:synology-nas:drives-not-normal-list
  '@type': liongard:MetricPrimitive
  name: "Synology NAS — Drives Not in Normal State (List)"
  description: Names of disks whose drive_status_category is "health" and drive_status_key is not "normal".
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: synology-nas-inspector
    inspectorId: 64
  liongardMetricName: "Synology NAS: Drives Not In Normal State List"
  liongardMetricId: 914
  liongardMetricUuid: "64ea3f2a-47a9-4272-8055-531920d59119"
  jmesPath: "Disks[?drive_status_category && (drive_status_category == `health` && drive_status_key != `normal`)].name"
  resultType: array
  compliantWhen: result == []
  status: VALIDATED
  validatedOn: '2026-05-26'
  validatedSystemReference: "System A — dev environment"
  sourceRecipe: recipes/single-system-analysis/by-inspector/synology-nas.md
  dateAdded: '2026-05-26'

- '@id': metrics:synology-nas:drives-not-normal-count
  '@type': liongard:MetricPrimitive
  name: "Synology NAS — Drives Not in Normal State (Count)"
  description: Count of disks whose drive_status_category is "health" and drive_status_key is not "normal".
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: synology-nas-inspector
    inspectorId: 64
  liongardMetricName: "Synology NAS: Drives Not In Normal State Count"
  liongardMetricId: 915
  liongardMetricUuid: "f15fcd01-3efe-4df8-9888-74921c12e35c"
  jmesPath: "Disks[?drive_status_category && (drive_status_category == `health` && drive_status_key != `normal`)] | length(@)"
  resultType: integer
  resultUnit: count
  compliantWhen: result == 0
  status: VALIDATED
  validatedOn: '2026-05-26'
  validatedSystemReference: "System A — dev environment"
  sourceRecipe: recipes/single-system-analysis/by-inspector/synology-nas.md
  dateAdded: '2026-05-26'

- '@id': metrics:synology-nas:disks-normal-count
  '@type': liongard:MetricPrimitive
  name: "Synology NAS — Disks in Normal State (Count)"
  description: Count of disks where drive_status_key is "normal". Complement of drives-not-normal-count.
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: synology-nas-inspector
    inspectorId: 64
  jmesPath: "length(Disks[?drive_status_key == 'normal'])"
  resultType: integer
  resultUnit: count
  status: VALIDATED
  validatedOn: '2026-05-26'
  validatedSystemReference: "System A — dev environment"
  sourceRecipe: recipes/single-system-analysis/by-inspector/synology-nas.md
  dateAdded: '2026-05-26'

- '@id': metrics:synology-nas:disks-ssd-count
  '@type': liongard:MetricPrimitive
  name: "Synology NAS — SSD Disk Count"
  description: Count of disks where isSsd is true (boolean). Drives with isSsd == false are HDDs or other rotational media.
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: synology-nas-inspector
    inspectorId: 64
  jmesPath: "length(Disks[?isSsd == `true`])"
  resultType: integer
  resultUnit: count
  fieldGotcha: "Disks[].isSsd is a BOOLEAN (true/false), not a string. Filter with == `true`
    (backtick literal). remain_life is an OBJECT {trustable: bool, value: int}, not a scalar
    — use remain_life.value for the percentage integer."
  status: VALIDATED
  validatedOn: '2026-05-26'
  validatedSystemReference: "System A — dev environment"
  sourceRecipe: recipes/single-system-analysis/by-inspector/synology-nas.md
  dateAdded: '2026-05-26'

