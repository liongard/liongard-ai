$schema: ../../schemas/primitive.schema.json
primitives:

# ── System Identity ────────────────────────────────────────────────────────────

- '@id': metrics:synology-nas:firmware-version
  '@type': liongard:MetricPrimitive
  name: "Synology NAS — Firmware Version"
  description: DSM firmware version string reported by the NAS (e.g., "DSM 7.2.2-72806 Update 3").
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: synology-nas-inspector
    inspectorId: 64
  liongardMetricName: "Synology NAS: Firmware Version"
  liongardMetricId: 393
  liongardMetricUuid: "5b2b65ab-aefc-43ff-a1a7-93b26e86b606"
  jmesPath: SystemInfo.firmware_ver
  resultType: string
  status: VALIDATED
  validatedOn: '2026-05-26'
  validatedSystemReference: "System A — dev environment"
  sourceRecipe: recipes/single-system-analysis/by-inspector/synology-nas.md
