"$schema": "../../schemas/primitive.schema.json"

primitives:

  - "@id": "metrics:sophos-firewall:active-user-list"
    "@type": "liongard:MetricPrimitive"
    name: "Sophos Firewall — Active User List"
    description: "Returns the names of all currently active users on the Sophos XG/XGS firewall"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "sophos-firewall-inspector"
      inspectorId: 28
    liongardMetricName: "Sophos XG: Active User List"
    liongardMetricId: 220
    liongardMetricUuid: "502c1159-472f-492c-90ec-67daa8d3f61d"
    jmesPath: "User[?Status == `Active`].Name | join(`, `, @)"
    resultType: "string"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/sophos-firewall.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:sophos-firewall:interfaces-count"
    "@type": "liongard:MetricPrimitive"
    name: "Sophos Firewall — Interfaces Count"
    description: "Total number of interfaces configured on the Sophos XG/XGS firewall"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "sophos-firewall-inspector"
