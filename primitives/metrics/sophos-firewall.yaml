    liongardMetricName: "Sophos XG: Interfaces Count"
    liongardMetricId: 221
    liongardMetricUuid: "bb45a089-bfde-4b0e-b673-7b31bc6a4ae0"
    jmesPath: "SystemInfo.InterfacesCount"
    resultType: "integer"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/sophos-firewall.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:sophos-firewall:user-summary"
    "@type": "liongard:MetricPrimitive"
    name: "Sophos Firewall — Active User Summary"
    description: "Returns name, status, and group membership for all active users on the Sophos XG/XGS firewall"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "sophos-firewall-inspector"
      inspectorId: 28
    liongardMetricName: "Sophos XG: User Summary"
    liongardMetricId: 582
    liongardMetricUuid: "ff180dfa-102d-4ebc-9348-13a31373cb3b"
    jmesPath: "User[?Status == `Active`].join( ` ', ' `, [join(`: `, [`Name`, to_string(Name)]), join(`: `, [`Status`, to_string(Status)])])"
    resultType: "array"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/sophos-firewall.md"
    dateAdded: "2026-05-26"

