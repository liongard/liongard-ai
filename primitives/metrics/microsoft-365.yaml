# ── SharePoint / Collaboration ────────────────────────────────────────────────

  - "@id": "metrics:microsoft-365:sharepoint-sites-count"
    "@type": "liongard:MetricPrimitive"
    name: "Microsoft 365 — SharePoint Sites Count"
    description: "Total count of SharePoint sites. Case-sensitive key: lowercase 'sites', NOT 'Sites'."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "microsoft-365-inspector"
      inspectorId: 8
    liongardMetricName: "Microsoft SharePoint: Total Sites Count"
    liongardMetricId: 1234
    liongardMetricUuid: "9a4b9a00-d026-4906-9c9d-21c1e4696aeb"
    jmesPath: "sites[] | length(@)"
    resultType: "integer"
    resultUnit: "count"
    fieldGotcha: "SharePoint sites key is lowercase 'sites' — JMESPath is case-sensitive. 'Sites' (capital S) returns null. VALIDATED: System B (2026-05-22, inspectorID=8) returned 18 sites."
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System B — dev environment"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/microsoft-365.md"
    dateAdded: "2026-05-26"
