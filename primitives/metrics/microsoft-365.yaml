  - "@id": "metrics:microsoft-365:unlicensed-users-count"
    "@type": "liongard:MetricPrimitive"
    name: "Microsoft 365 — Unlicensed Users Count"
    description: "Count of users with no assigned product license (Assigned_Products == empty string)."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "microsoft-365-inspector"
      inspectorId: 8
    liongardMetricName: "Office 365: Unlicensed User Count"
    liongardMetricId: 40
    liongardMetricUuid: "6725435b-1569-4265-8269-da11ce20bc78"
    jmesPath: "Users[?Assigned_Products == ``] | length(@)"
    resultType: "integer"
    resultUnit: "count"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System A — dev environment"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/microsoft-365.md"
