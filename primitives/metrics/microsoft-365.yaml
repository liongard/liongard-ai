  - "@id": "metrics:microsoft-365:disabled-users-with-licenses-count"
    "@type": "liongard:MetricPrimitive"
    name: "Microsoft 365 — Disabled Users with Licenses Count"
    description: "Count of disabled accounts (accountEnabled == false) that still have at least one assigned license. True-up savings opportunity."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "microsoft-365-inspector"
      inspectorId: 8
    liongardMetricName: "Office 365: Disabled Users with Licenses Count"
    liongardMetricId: 879
    liongardMetricUuid: "40800f5f-5b94-47cc-9ff4-b0e460ea35ab"
    jmesPath: "Users[?accountEnabled == `false` && assignedLicenses.length(@) > `0`] | length(@)"
    resultType: "integer"
    resultUnit: "count"
    compliantWhen: "result == 0"
    compliesWith:
      - "CIS-Controls-v8:5.3"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System A — dev environment"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/microsoft-365.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:microsoft-365:stale-licensed-users-count"
    "@type": "liongard:MetricPrimitive"
    name: "Microsoft 365 — Stale Licensed Users Count"
    description: "Count of active users inactive in the last 30 days (activeLast30Days == false AND accountEnabled == true). Candidate accounts for license reclamation."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "microsoft-365-inspector"
      inspectorId: 8
    liongardMetricName: "Office 365: Stale or Disused User Accounts Count"
    liongardMetricId: 767
    liongardMetricUuid: "caf567e8-0705-4b0c-9746-74bd84fce054"
    jmesPath: "length(Users[?activeLast30Days==`false` && accountEnabled == `true` ])"
    resultType: "integer"
    resultUnit: "count"
    compliesWith:
      - "CIS-Controls-v8:5.3"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System A — dev environment"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/microsoft-365.md"
    dateAdded: "2026-05-26"

# ── Privileged Users ──────────────────────────────────────────────────────────

  - "@id": "metrics:microsoft-365:privileged-users-count"
    "@type": "liongard:MetricPrimitive"
    name: "Microsoft 365 — Privileged Users Count"
    description: "Count of M365 users flagged as privileged (Privileged == 'Yes'). Pair with metrics:microsoft-365:admin-users-mfa-disabled-count for risk surfacing."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "microsoft-365-inspector"
      inspectorId: 8
    liongardMetricName: "Office 365: Privileged Users Count"
    liongardMetricId: 20
    liongardMetricUuid: "a2d664f3-7c88-44af-97c2-afbda125296e"
    jmesPath: "Users[?Privileged == `Yes`] | length(@)"
    resultType: "integer"
    resultUnit: "count"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System A — dev environment"
    compliesWith:
      - "CIS-Controls-v8:6.8"
      - "cyber-insurance-domain-auth"
    answersQuestion:
      - "cyber-insurance:privileged-account-inventory"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/microsoft-365.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:microsoft-365:privileged-users-list"
    "@type": "liongard:MetricPrimitive"
    name: "Microsoft 365 — Privileged Users List"
    description: "Display names of users flagged as privileged, sorted by id."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "microsoft-365-inspector"
      inspectorId: 8
    liongardMetricName: "Office 365: Privileged Users List"
    liongardMetricId: 450
    liongardMetricUuid: "d1869d23-f02b-4b69-a161-deade46b6352"
    jmesPath: "Users[?Privileged==`Yes`] | sort_by(@,&id)[].[displayName || userPrincipalName] | []"
    resultType: "array"
    compliesWith:
      - "CIS-Controls-v8:6.8"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System B — dev environment"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/microsoft-365.md"
    dateAdded: "2026-05-26"

# ── MFA Coverage ──────────────────────────────────────────────────────────────

  - "@id": "metrics:microsoft-365:admin-users-mfa-disabled-count"
    "@type": "liongard:MetricPrimitive"
    name: "Microsoft 365 — Admin Users with MFA Disabled Count"
    description: "Count of privileged users where MFA is not effectively enforced. Evaluates Security Defaults, CA policy coverage, exclusions, and per-user MFA state. Changes take 24–48h to propagate."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "microsoft-365-inspector"
      inspectorId: 8
    liongardMetricName: "Office 365: Admin Users with MFA Disabled Count"
    liongardMetricId: 683
    liongardMetricUuid: "2ff8cf28-d363-401d-b5d8-bc5c38aac4cb"
    jmesPath: "subtract(length(Users[?Privileged == `Yes`]), length(Users[?Privileged == `Yes` && mfaDetails.enforced == `true`]))"
    resultType: "integer"
    resultUnit: "count"
    compliantWhen: "result == 0"
    compliesWith:
      - "CIS-Controls-v8:6.3"
      - "cyber-insurance-domain-auth"
    answersQuestion:
      - "cyber-insurance:mfa-admin-coverage"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System B — dev environment"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/microsoft-365.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:microsoft-365:non-admin-users-mfa-disabled-count"
    "@type": "liongard:MetricPrimitive"
    name: "Microsoft 365 — Non-Admin Users with MFA Disabled Count"
    description: "Count of non-privileged users where MFA is not effectively enforced. Same evaluation method as admin-users-mfa-disabled-count."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "microsoft-365-inspector"
      inspectorId: 8
    liongardMetricName: "Office 365: Non-Admin Users with MFA Disabled Count"
    liongardMetricId: 763
    liongardMetricUuid: "61316daa-1146-4eb4-bb90-36f360a01a54"
    jmesPath: "subtract(length(Users[?Privileged != `Yes`]), length(Users[?Privileged != `Yes` && mfaDetails.enforced == `true`]))"
    resultType: "integer"
    resultUnit: "count"
    compliantWhen: "result == 0"
    compliesWith:
      - "CIS-Controls-v8:6.3"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System B — dev environment"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/microsoft-365.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:microsoft-365:users-not-mfa-registered-count"
    "@type": "liongard:MetricPrimitive"
    name: "Microsoft 365 — Users Not Registered for MFA Count"
    description: "Count of enabled users where isMfaRegistered_r != 'Enabled'."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "microsoft-365-inspector"
      inspectorId: 8
    liongardMetricName: "Azure Active Directory: Users not registered for MFA Count"
    liongardMetricId: 994
    liongardMetricUuid: "629282ed-8dc0-4448-9c71-a2a31acc05e2"
    jmesPath: "Users[?isMfaRegistered_r != `Enabled` && accountEnabled == `true`] | length(@)"
    resultType: "integer"
    resultUnit: "count"
    compliantWhen: "result == 0"
    compliesWith:
      - "CIS-Controls-v8:6.3"
      - "cyber-insurance-domain-auth"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System B — dev environment"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/microsoft-365.md"
    dateAdded: "2026-05-26"

# ── Security Posture ──────────────────────────────────────────────────────────

  - "@id": "metrics:microsoft-365:security-defaults-enabled"
    "@type": "liongard:MetricPrimitive"
    name: "Microsoft 365 — Security Defaults Enabled"
    description: "Boolean: whether Microsoft Security Defaults are enabled for the tenant. When true, basic MFA and legacy auth-block policies are auto-enforced."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "microsoft-365-inspector"
      inspectorId: 8
    liongardMetricName: "Azure Active Directory: Security Defaults Enabled Status"
    liongardMetricId: 987
    liongardMetricUuid: "62496d5d-f1ad-487f-8ae9-2b87e577943e"
    jmesPath: "SystemInfo.Overview.securityDefaults.isEnabled"
    resultType: "boolean"
    compliantWhen: "result == true when Conditional Access is not in use (Basic or Business tenants)"
    compliesWith:
      - "CIS-Controls-v8:6.3"
      - "cyber-insurance-domain-auth"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System B — dev environment"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/microsoft-365.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:microsoft-365:conditional-access-policies-list"
    "@type": "liongard:MetricPrimitive"
    name: "Microsoft 365 — Conditional Access Policies (Enabled List)"
    description: "Display names of Conditional Access policies where state == 'enabled'. Used as cyber-insurance evidence of CA enforcement."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "microsoft-365-inspector"
      inspectorId: 8
    liongardMetricName: "Azure Active Directory: Conditional Access Policies List"
    liongardMetricId: 979
    liongardMetricUuid: "36d8e11a-7f6c-469d-8599-60efe1317aa7"
    jmesPath: "Policies.ConditionalAccess[?state == `enabled`].displayName"
    resultType: "array"
    compliesWith:
      - "CIS-Controls-v8:6.3"
      - "cyber-insurance-domain-auth"
    answersQuestion:
      - "cyber-insurance:conditional-access-evidence"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System B — dev environment"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/microsoft-365.md"
    dateAdded: "2026-05-26"

