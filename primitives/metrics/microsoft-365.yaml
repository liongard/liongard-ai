"$schema": "../../schemas/primitive.schema.json"

primitives:

# ── Tenant / Domains ──────────────────────────────────────────────────────────

  - "@id": "metrics:microsoft-365:associated-domains"
    "@type": "liongard:MetricPrimitive"
    name: "Microsoft 365 — Associated Domains"
    description: "Domain names associated with this Microsoft 365 tenant (joined comma-separated string)."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "microsoft-365-inspector"
      inspectorId: 8
    liongardMetricName: "Office 365: Associated Domains"
    liongardMetricId: 6
    liongardMetricUuid: "b63da025-218e-43b1-9b9c-871ef445eabf"
    jmesPath: "Domains[*].id | join(`, `, @)"
    resultType: "string"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System A — dev environment"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/microsoft-365.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:microsoft-365:directory-sync-enabled"
    "@type": "liongard:MetricPrimitive"
    name: "Microsoft 365 — Directory Sync Enabled"
    description: "Boolean indicating whether Entra ID / Azure AD Connect directory sync is enabled for this tenant."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "microsoft-365-inspector"
      inspectorId: 8
    liongardMetricName: "Office 365: Directory Sync Enabled"
    liongardMetricId: 529
    liongardMetricUuid: "914da63e-07b7-47f2-878c-6ab4c0027a12"
    jmesPath: "SystemInfo.DirectorySync[].DirectorySyncEnabled | [0]"
    resultType: "boolean"
    compliantWhen: "result == true when hybrid environment expected; result == false for cloud-only tenants"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System B — dev environment"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/microsoft-365.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:microsoft-365:directory-sync-stale-hours-count"
    "@type": "liongard:MetricPrimitive"
    name: "Microsoft 365 — Directory Sync Stale (>=24h) Count"
    description: "Count of orgs where directory sync is enabled but HoursSinceLastSync_r >= 24. Should be 0 in a healthy hybrid tenant."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "microsoft-365-inspector"
      inspectorId: 8
    liongardMetricName: "Microsoft 365: Hours Since Last Directory Sync >=24"
    liongardMetricId: 1790
    liongardMetricUuid: "9dd1e31c-4513-4aa3-8bec-f1d1ce79bce3"
    jmesPath: "SystemInfo.DirectorySync[?DirectorySyncEnabled == `true` && HoursSinceLastSync_r >= `24`] | length(@)"
    resultType: "integer"
    resultUnit: "count"
    compliantWhen: "result == 0"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System B — dev environment"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/microsoft-365.md"
    dateAdded: "2026-05-26"

# ── User Counts ───────────────────────────────────────────────────────────────

  - "@id": "metrics:microsoft-365:active-users-count"
