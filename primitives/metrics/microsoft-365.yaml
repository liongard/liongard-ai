      inspectorId: 8
    liongardMetricName: "Office 365: Enabled Accounts Count"
    liongardMetricId: 1786
    liongardMetricUuid: "29ecfd36-6b42-41c0-8377-a14247d09542"
    jmesPath: "length(Users[?accountEnabled == `true`])"
    resultType: "integer"
    resultUnit: "count"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "System A — dev environment"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/microsoft-365.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:microsoft-365:disabled-users-count"
