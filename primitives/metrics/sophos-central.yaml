# ── Product Coverage ──────────────────────────────────────────────────────────

  - "@id": "metrics:sophos-central:endpoint-protection-installed-count"
    "@type": "liongard:MetricPrimitive"
    name: "Sophos Central — Endpoint Protection Installed Count"
    description: "Count of endpoints with assignedProducts code='endpointProtection' and status='installed'."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "sophos-central-inspector"
      inspectorId: 65
    liongardMetricName: "Sophos Central: Endpoints with Endpoint Protection Installed Count"
    liongardMetricId: 402
    liongardMetricUuid: "266f6c9f-b073-4f26-871a-d6a6574e558d"
    jmesPath: "Endpoints[?assignedProducts[?code == `endpointProtection` && status==`installed`]] | length(@)"
    resultType: "integer"
    resultUnit: "count"
    compliesWith:
      - "CIS-Controls-v8:10.1"
      - "cyber-insurance-domain-endpoint"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    fieldGotcha: "assignedProducts is an array of objects with 'code' and 'status' fields. code values are camelCase strings: 'endpointProtection', 'interceptX', 'coreAgent', 'mtr', 'deviceEncryption'. status values are camelCase: 'installed', 'notInstalled'. Neither field uses booleans."
    sourceRecipe: "recipes/single-system-analysis/by-inspector/sophos-central.md"
    dateAdded: "2026-05-26"

