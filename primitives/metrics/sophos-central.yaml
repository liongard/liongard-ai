"$schema": "../../schemas/primitive.schema.json"

primitives:

# ── Endpoint Health ───────────────────────────────────────────────────────────

  - "@id": "metrics:sophos-central:threat-health-not-good-count"
    "@type": "liongard:MetricPrimitive"
    name: "Sophos Central — Endpoints with Threat Health Not Good Count"
    description: "Count of endpoints where health.threats.status != 'good'. Any result > 0 requires active threat investigation."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "sophos-central-inspector"
      inspectorId: 65
    liongardMetricName: "Sophos Central: Endpoints with Threat Health Not In Good State Count"
    liongardMetricId: 927
    liongardMetricUuid: "7ea6fdad-ca12-43d7-ab6e-e8e01d2cdea2"
    jmesPath: "Endpoints[?health.threats.status != `good`] | length(@)"
    resultType: "integer"
    resultUnit: "count"
    compliantWhen: "result == 0"
    compliesWith:
      - "cyber-insurance-domain-endpoint"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    fieldGotcha: "health.threats.status is a string — 'good' is the compliant value. Other values include 'bad' and 'suspicious'. Filter uses backtick-quoted string in JMESPath."
    sourceRecipe: "recipes/single-system-analysis/by-inspector/sophos-central.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:sophos-central:threat-health-not-good-list"
