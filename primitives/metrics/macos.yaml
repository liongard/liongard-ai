"$schema": "../../schemas/primitive.schema.json"

primitives:
- '@id': metrics:mac-inspector:os-version
  '@type': liongard:MetricPrimitive
  name: macOS — OS Version
  description: macOS operating system version string (e.g., 'macOS Sonoma 14.0').
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: mac-inspector
    inspectorId: 96
  liongardMetricName: 'macOS: Operating System'
  liongardMetricId: 2102
  liongardMetricUuid: "9c40cff7-422c-4f55-a4d1-6908d7f9d8dd"
  jmesPath: Overview.OsVersion
  resultType: string
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: System Q (inspected 2026-04-21) — 'macOS Sonoma 14.0'
  sourceRecipe: recipes/single-system-analysis/by-inspector/macos.md
  dateAdded: '2026-05-28'

