    inspectorSlug: mac-inspector
    inspectorId: 96
  liongardMetricName: 'macOS: Model'
  liongardMetricId: 2105
  liongardMetricUuid: "268d7f04-32f7-4d1a-97d2-7d4f1d3baeaa"
  jmesPath: Overview.MachineModel
  resultType: string
