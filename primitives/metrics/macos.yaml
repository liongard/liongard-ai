- '@id': metrics:mac-inspector:system-integrity-status
  '@type': liongard:MetricPrimitive
  name: macOS — System Integrity Protection Status
  description: 'SIP status string. Compliant value: ''integrity_enabled''.'
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: mac-inspector
    inspectorId: 96
  liongardMetricName: 'macOS: System Integrity Status'
  liongardMetricId: 2112
  liongardMetricUuid: "1c5797dd-426c-46c0-9509-07a6ae106159"
  jmesPath: Overview.SystemIntegrity
  resultType: string
  fieldGotcha: Overview.SystemIntegrity is a STRING 'integrity_enabled' (lowercase
    with underscore) — NOT a boolean and NOT 'Enabled'.
  compliantWhen: result == 'integrity_enabled'
  compliesWith:
  - CIS-Controls-v8:10.5
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: System Q (inspected 2026-04-21) — 'integrity_enabled'
  sourceRecipe: recipes/single-system-analysis/by-inspector/macos.md
  dateAdded: '2026-05-28'

- '@id': metrics:mac-inspector:gatekeeper-status
  '@type': liongard:MetricPrimitive
  name: macOS — Gatekeeper Status
  description: 'Gatekeeper application verification status. Compliant value: ''Enabled''.'
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: mac-inspector
    inspectorId: 96
  liongardMetricName: 'macOS: Gatekeeper Status'
  liongardMetricId: 2116
  liongardMetricUuid: "1adaa3a8-4874-4340-ad4c-3f797bc95280"
  jmesPath: Overview.GateKeeper
  resultType: string
  fieldGotcha: Overview.GateKeeper is a STRING 'Enabled'/'Disabled' (Title Case) —
    NOT a boolean.
  compliantWhen: result == 'Enabled'
  compliesWith:
  - CIS-Controls-v8:10.5
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: System Q (inspected 2026-04-21) — 'Enabled'
  sourceRecipe: recipes/single-system-analysis/by-inspector/macos.md
  dateAdded: '2026-05-28'

- '@id': metrics:mac-inspector:filevault-status
  '@type': liongard:MetricPrimitive
  name: macOS — FileVault Encryption Status
  description: 'Full disk encryption status from Overview. Compliant value: ''On''.'
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: mac-inspector
    inspectorId: 96
  liongardMetricName: 'macOS: File Vault Encryption Status'
  liongardMetricId: 2119
  liongardMetricUuid: "50e01766-a578-4174-b4ca-b54d75c44ce2"
  jmesPath: Overview.FileVaultEncryption
  resultType: string
  fieldGotcha: 'Two separate FileVault fields exist: (1) Overview.FileVaultEncryption
    = simple ''On''/''Off'' policy setting; (2) DriveEncryptionStatus[0].FileVault
    = detailed per-volume string like ''Yes (Unlocked)''. Use Overview.FileVaultEncryption
    for the policy check.'
  compliantWhen: result == 'On'
  compliesWith:
  - CIS-Controls-v8:3.6
  - cyber-insurance-domain-endpoint
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: System Q (inspected 2026-04-21) — 'Off'
  sourceRecipe: recipes/single-system-analysis/by-inspector/macos.md
  dateAdded: '2026-05-28'

- '@id': metrics:mac-inspector:activation-lock-status
  '@type': liongard:MetricPrimitive
  name: macOS — Activation Lock Status
  description: Activation lock status string. Value 'disabled' means device is not
    activation-locked.
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: mac-inspector
    inspectorId: 96
  liongardMetricName: 'macOS: Activation Lock Status'
  liongardMetricId: 2118
  liongardMetricUuid: "56721d3f-9f37-4718-bac2-bed97adb805b"
  jmesPath: Overview.ActivationLockStatus
  resultType: string
  fieldGotcha: Overview.ActivationLockStatus is LOWERCASE string 'disabled'/'enabled'
    — not Title Case.
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: System Q (inspected 2026-04-21) — 'disabled'
  sourceRecipe: recipes/single-system-analysis/by-inspector/macos.md
  dateAdded: '2026-05-28'

