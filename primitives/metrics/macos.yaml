- '@id': metrics:mac-inspector:guest-user-enabled
  '@type': liongard:MetricPrimitive
  name: macOS — Guest User Enabled
  description: 'Whether the guest user account is enabled. Compliant value: false.'
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: mac-inspector
    inspectorId: 96
  jmesPath: UserSettings.GuestEnabled
  resultType: boolean
  compliantWhen: result == false
  compliesWith:
  - CIS-Controls-v8:5.4
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: System Q (inspected 2026-04-21) — false
  sourceRecipe: recipes/single-system-analysis/by-inspector/macos.md
  dateAdded: '2026-05-28'

- '@id': metrics:mac-inspector:firewall-state
  '@type': liongard:MetricPrimitive
  name: macOS — Application Firewall State
  description: 'macOS application-layer firewall state. Compliant value: ''Enabled''
    (not ''Disabled'').'
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: mac-inspector
    inspectorId: 96
  jmesPath: Firewall.globalState
  resultType: string
  fieldGotcha: Firewall.globalState is a STRING 'Enabled'/'Disabled' (Title Case)
    — NOT a boolean. Firewall.loggingEnabled is a BOOLEAN. Firewall.stealthEnabled
    is a STRING 'Enabled'/'Disabled' (inconsistency — same object, mixed types).
  compliantWhen: result == 'Enabled'
  compliesWith:
  - CIS-Controls-v8:12.1
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: System Q (inspected 2026-04-21) — 'Disabled'
  sourceRecipe: recipes/single-system-analysis/by-inspector/macos.md
  dateAdded: '2026-05-28'

- '@id': metrics:mac-inspector:drive-percent-free
  '@type': liongard:MetricPrimitive
  name: macOS — Primary Drive Percent Free
  description: Percentage of free space on the primary drive (Drives[0]). Alert when
    below 10%.
  evaluates:
    '@type': liongard:Inspector
    inspectorSlug: mac-inspector
    inspectorId: 96
  jmesPath: Drives[0].PercentFreeSpace
  resultType: integer
  resultUnit: percent
  compliantWhen: result >= 10
  status: VALIDATED
  validatedOn: '2026-05-28'
  validatedSystemReference: System Q (inspected 2026-04-21) — 89%
  sourceRecipe: recipes/single-system-analysis/by-inspector/macos.md
  dateAdded: '2026-05-28'
