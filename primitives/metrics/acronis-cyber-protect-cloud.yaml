    liongardMetricId: 1674
    liongardMetricUuid: "34ad5a63-2d4d-433f-b4fb-9d3857d3cbd7"
    jmesPath: "Resources[?type == `resource.machine` && policies[?type == `policy.backup.machine`]].name || `-`"
    resultType: "array"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/acronis-cyber-protect-cloud.md"
