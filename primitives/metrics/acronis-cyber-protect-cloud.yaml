  - "@id": "metrics:acronis-cyber-protect-cloud:list-of-machines-without-backup-enabled"
    "@type": "liongard:MetricPrimitive"
    name: "Acronis Cyber Cloud — List of Machines without Backup Enabled"
    description: "Names of machine resources that do NOT have a machine backup policy attached — coverage gap. JMESPath: Resources[?type == `resource.machine` && (!policies || !contains(policies[].type, `policy.backup.machine`))].name"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "acronis-cyber-protect-cloud-inspector"
      inspectorId: 93
    liongardMetricName: "Acronis Cyber Cloud: List of Machines without Backup Enabled"
    liongardMetricId: 1675
    liongardMetricUuid: "593939fa-619c-4e47-aa94-d8a0be2d7919"
    jmesPath: "Resources[?type == `resource.machine` && (!policies || !contains(policies[].type, `policy.backup.machine`))].name || `-`"
    resultType: "array"
    compliantWhen: "result == null || length(result) == 0"
    compliesWith:
      - "CIS-Controls-v8:11.2"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/acronis-cyber-protect-cloud.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:acronis-cyber-protect-cloud:machine-backup-summary"
    "@type": "liongard:MetricPrimitive"
    name: "Acronis Cyber Cloud — Machine Backup Summary"
    description: "Per-machine backup policy summary including last_run, last_success_run, and next_run timestamps for machines with a backup policy attached."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "acronis-cyber-protect-cloud-inspector"
      inspectorId: 93
    liongardMetricName: "Acronis Cyber Cloud: Machine Backup Summary"
    liongardMetricId: 1685
    liongardMetricUuid: "b1225afb-8b22-4ee1-9c9e-24381449cec0"
    jmesPath: "Resources[?type == `resource.machine` && policies[?type == `policy.backup.machine`]].join('', ['Name: ', name, ', Last Run: ', policies[?type == `policy.backup.machine`].last_run | [0], ', Last Successful Run: ', policies[?type == `policy.backup.machine`].last_success_run | [0], ', Next Run: ', policies[?type == `policy.backup.machine`].next_run | [0]]) | join(` | `, @)"
    resultType: "string"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/acronis-cyber-protect-cloud.md"
    dateAdded: "2026-05-26"

  - "@id": "metrics:acronis-cyber-protect-cloud:count-of-machines-not-backed-up-24h"
    "@type": "liongard:MetricPrimitive"
    name: "Acronis Cyber Cloud — Count of Machines Not Successfully Backed Up In Last 24 Hours"
    description: "Count of machines with backup enabled whose last_success_run is more than 24 hours ago — stale backup finding."
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "acronis-cyber-protect-cloud-inspector"
      inspectorId: 93
    liongardMetricName: "Acronis Cyber Cloud: Count of Machines Not Successfully Backed Up In Last 24 Hours"
    liongardMetricId: 1686
    liongardMetricUuid: "95237b12-33d3-4e44-991e-5c5d530f5d25"
    jmesPath: "Resources[?type == `resource.machine` && policies[?type == `policy.backup.machine`] && policies[?type == `policy.backup.machine`].last_success_run && (time_since(policies[?type == `policy.backup.machine`].last_success_run | [0], 'hours') > `24`)] | length(@)"
    resultType: "integer"
    compliantWhen: "result == 0"
    compliesWith:
      - "CIS-Controls-v8:11.2"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/acronis-cyber-protect-cloud.md"
    dateAdded: "2026-05-26"

