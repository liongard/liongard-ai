"$schema": "../../schemas/primitive.schema.json"

primitives:

  - "@id": "metrics:acronis-cyber-protect-cloud:count-of-machines"
    "@type": "liongard:MetricPrimitive"
    name: "Acronis Cyber Cloud — Count of Machines"
    description: "Count of machine-type resources registered in this Acronis tenant. JMESPath: Resources[?type==`resource.machine`] | length(@)"
    evaluates:
      "@type": "liongard:Inspector"
      inspectorSlug: "acronis-cyber-protect-cloud-inspector"
      inspectorId: 93
    liongardMetricName: "Acronis Cyber Cloud: Count of Machines"
    liongardMetricId: 1672
    liongardMetricUuid: "9da11d3c-29a8-4f9e-bb5b-b0874df684cb"
    jmesPath: "Resources[?type==`resource.machine`] | length(@)"
    resultType: "integer"
    status: "VALIDATED"
    validatedOn: "2026-05-26"
    validatedSystemReference: "Liongard Global metric catalog"
    sourceRecipe: "recipes/single-system-analysis/by-inspector/acronis-cyber-protect-cloud.md"
    dateAdded: "2026-05-26"

